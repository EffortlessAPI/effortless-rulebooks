name: Apply TSP provider bridge and benchmark loops 711-836

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-provider-711-836.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-provider-711-836-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      TSP_DB: erb_traveling_salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.410'

      - name: Install pinned Effortless CLI
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          effortless -info

      - name: Materialize provider package and portable history
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          provider="$domain/evidence-providers/benchmark-717-836"
          rm -rf /tmp/tsp-provider-package "$provider"
          mkdir -p /tmp/tsp-provider-package "$provider"
          cat .github/tsp_payload/tsp-benchmark-loops-717-836.zip.b64.part-* | base64 -d > /tmp/tsp-provider.zip
          unzip -q /tmp/tsp-provider.zip -d /tmp/tsp-provider-package
          cp -a /tmp/tsp-provider-package/tsp-benchmark-loops-717-836/. "$provider/"
          cp .github/tsp_payload/PROVIDER_HISTORY_647_836.tsv "$provider/PROVIDER_HISTORY_647_836.tsv"
          sha256sum "$provider/PROVIDER_HISTORY_647_836.tsv"

      - name: Independently replay provider payloads and finite computations
        id: provider_replay
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          provider="$domain/evidence-providers/benchmark-717-836"
          (
            cd "$provider"
            PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 - <<'PY'
          import json
          import validate_benchmark_campaign as v
          ext = v.load('benchmark-rulebook-extension.json')
          loops = ext['Loops']
          if [row['LoopOrder'] for row in loops] != list(range(717, 837)):
              raise AssertionError('provider loop range mismatch')
          if any(row['Status'] != 'CLOSED' or row.get('BasisDelta') != {'new_atoms': 0, 'new_operators': 0} for row in loops):
              raise AssertionError('provider loop status or basis drift')
          history = open('PROVIDER_HISTORY_647_836.tsv').read().splitlines()
          if len(history) != 196:
              raise AssertionError(f'provider history length={len(history)}')
          messages = [line.split('\t', 1)[1] for line in history]
          required = ['TSP loops 717-836: register benchmark and witness campaign'] + [f"TSP loop {row['LoopOrder']}: {row['DisplayName']}" for row in loops]
          positions = []
          for message in required:
              if message not in messages:
                  raise AssertionError(f'missing provider history message: {message}')
              positions.append(messages.index(message))
          if positions != sorted(positions) or len(set(positions)) != len(positions):
              raise AssertionError('provider history order mismatch')
          benchmark, prior, dev_search, region, third, ablation, combined = v.validate_payloads()
          v.validate_external(benchmark)
          v.validate_negative()
          v.validate_prior(prior)
          v.validate_development_search(dev_search)
          v.validate_region(region)
          v.validate_third(third)
          if combined['basis'] != {'atoms': ['SEMANTIC_ARC'], 'operators': ['WARRANTED_REWRITE'], 'new_primitives': 0}:
              raise AssertionError('combined basis drift')
          if ablation['summary']['seed_portfolio_exact_count'] != 29 or ablation['summary']['local_portfolio_exact_count'] != 30:
              raise AssertionError('witness ablation drift')
          print('TSP provider source and computation replay: PASS')
          PY
          ) | tee /tmp/tsp-provider-replay.log
          grep -q 'TSP provider source and computation replay: PASS' /tmp/tsp-provider-replay.log

      - name: Apply canonical bridge and provider benchmark ledger
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/apply_provider_loops_711_836.py"
          python3 rulebook-examples/effortless-math/scripts/format-rulebook.py \
            "$domain/effortless-rulebook/traveling-salesman-rulebook.json"
          cat > "$domain/testing/provider-711-836-status.json" <<EOF
          {
            "status": "SUCCEEDED",
            "github_run_id": "$GITHUB_RUN_ID",
            "last_loop": 836,
            "provider_replay": "PASS",
            "provider_commit_ledger_sha256": "a2f8caadefabe708f1854e2dd52b75a8a3df4212f93c7af11c5b9998c662b2d3",
            "canonical_bridge": "711-716",
            "provider_benchmark": "717-836"
          }
          EOF
          python3 "$domain/scripts/validate_rulebook.py"

      - name: Rebuild and test the generated Postgres projection
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          bash "$domain/start.sh" build
          bash "$domain/start.sh" db
          bash "$domain/start.sh" test
          psql -h "$PGHOST" -U "$PGUSER" -d "$TSP_DB" -v ON_ERROR_STOP=1 -tA -c \
            "SELECT max(loop_order), count(*) FROM vw_tsp_loops" | tee /tmp/tsp-loop-postgres.txt
          grep -q '^836|260$' /tmp/tsp-loop-postgres.txt

      - name: Persist replay transcript and final validation
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp /tmp/tsp-provider-replay.log "$domain/testing/provider-711-836-replay.log"
          cp /tmp/tsp-loop-postgres.txt "$domain/testing/provider-711-836-postgres.txt"
          python3 "$domain/scripts/validate_rulebook.py"
          rm -f .github/tsp_payload/tsp-benchmark-loops-717-836.zip.b64.part-* \
                .github/tsp_payload/PROVIDER_HISTORY_647_836.tsv
          git add -A -- "$domain" .github/tsp_payload .github/workflows/apply-tsp-provider-711-836.yml
          git commit -m 'Integrate TSP provider bridge and benchmark loops 711-836'
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Record exact failure after preserving the prior branch state
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          log="$domain/testing/provider-711-836-failure.log"
          mkdir -p "$domain/testing"
          {
            echo "workflow_run_id=$GITHUB_RUN_ID"
            echo "head_sha=$GITHUB_SHA"
            echo "provider replay transcript follows when available"
            test -f /tmp/tsp-provider-replay.log && cat /tmp/tsp-provider-replay.log || true
            test -f /tmp/tsp-loop-postgres.txt && cat /tmp/tsp-loop-postgres.txt || true
          } > /tmp/provider-711-836-failure.log
          git fetch origin "$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"
          mkdir -p "$domain/testing"
          cp /tmp/provider-711-836-failure.log "$log"
          cat > "$domain/testing/provider-711-836-status.json" <<EOF
          {
            "status": "FAILED",
            "github_run_id": "$GITHUB_RUN_ID",
            "log": "testing/provider-711-836-failure.log"
          }
          EOF
          git add "$domain/testing/provider-711-836-status.json" "$log"
          git commit -m 'Record TSP provider integration failure' || true
          git push origin HEAD:"$TARGET_BRANCH" || true
