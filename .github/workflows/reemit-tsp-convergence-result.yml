name: Emit authoritative TSP convergence result

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-convergence-result.trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsp-semantic-foundation
          fetch-depth: 0

      - name: Inspect and emit result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          status_file="$domain/testing/convergence-597-610-status.json"
          verified_file="$domain/testing/convergence-597-610-verified.json"
          mkdir -p "$domain/testing"
          python3 - <<'PY'
          import json
          from pathlib import Path
          domain = Path('rulebook-examples/effortless-math/domains/traveling-salesman')
          status_path = domain/'testing/convergence-597-610-status.json'
          verified_path = domain/'testing/convergence-597-610-verified.json'
          status = json.loads(status_path.read_text()) if status_path.exists() else {'status': 'NOT_AVAILABLE'}
          verified = json.loads(verified_path.read_text()) if verified_path.exists() else None
          success = status.get('status') == 'SUCCEEDED' and verified and verified.get('status') == 'VERIFIED'
          rb_path = domain/'effortless-rulebook/traveling-salesman-rulebook.json'
          rb = json.loads(rb_path.read_text()) if rb_path.exists() else {}
          loops = {int(r['LoopOrder']): r for r in rb.get('TSPLoops', {}).get('data', [])}
          result = {
              'status': 'VERIFIED' if success else 'NOT_VERIFIED',
              'execution_status': status,
              'verification_status': verified,
              'closed_597_610': all(loops.get(i, {}).get('Status') == 'CLOSED' for i in range(597, 611)),
              'last_loop': max(loops) if loops else None,
          }
          (domain/'testing/convergence-597-610-final.json').write_text(json.dumps(result, indent=2) + '\n')
          if not success:
              raise SystemExit(42)
          PY
          result=$?
          if [ "$result" -eq 0 ]; then
            gh pr edit 2 --title 'TSP loops 577-610: predicate convergence and component-repair optimality'
          else
            gh pr edit 2 --title 'TSP loops 597-610: convergence run not yet verified'
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$domain/testing/convergence-597-610-final.json"
          git commit -m 'Emit authoritative TSP convergence result'
          git pull --rebase origin agent/tsp-semantic-foundation
          git push origin HEAD:agent/tsp-semantic-foundation
