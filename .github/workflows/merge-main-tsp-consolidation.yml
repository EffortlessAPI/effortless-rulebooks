name: Merge current main into TSP consolidation

on:
  push:
    branches:
      - agent/tsp_consolidation
    paths:
      - .tsp-merge-main.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsp_consolidation
          fetch-depth: 0
      - name: Merge live main without rewriting campaign history
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-ff origin/main -m 'Merge current main into TSP consolidation'
          rm -f .tsp-merge-main.trigger
          git add .tsp-merge-main.trigger
          git commit -m 'Remove TSP main-merge trigger' || true
          git push origin HEAD:agent/tsp_consolidation
