name: Diagnose TSP Effortless generation

on:
  push:
    branches:
      - main
    paths:
      - .tsp-effortless-generation-diagnose.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      DOMAIN: rulebook-examples/effortless-math/domains/traveling-salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.410'
      - name: Install pinned Effortless CLI
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          effortless -info > /tmp/tsp-generation-cli-info.log 2>&1
      - name: Run canonical validation and generation
        id: generation
        shell: bash
        run: |
          set +e
          python3 "$DOMAIN/scripts/validate_rulebook.py" > /tmp/tsp-generation-prevalidation.log 2>&1
          validation_code=$?
          if [ "$validation_code" -ne 0 ]; then
            echo "stage=prebuild-validation" >> "$GITHUB_OUTPUT"
            echo "exit_code=$validation_code" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cd "$DOMAIN"
          ./start.sh build > /tmp/tsp-generation-build.log 2>&1
          code=$?
          echo "stage=effortless-build" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic transcript
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          mkdir -p "$DOMAIN/testing"
          cp /tmp/tsp-generation-cli-info.log "$DOMAIN/testing/current-effortless-cli-info.log"
          cp /tmp/tsp-generation-prevalidation.log "$DOMAIN/testing/current-effortless-prevalidation.log"
          if [ -f /tmp/tsp-generation-build.log ]; then
            cp /tmp/tsp-generation-build.log "$DOMAIN/testing/current-effortless-generation.log"
          else
            : > "$DOMAIN/testing/current-effortless-generation.log"
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          domain = Path(os.environ['DOMAIN'])
          exit_code = int('${{ steps.generation.outputs.exit_code }}')
          payload = {
              'status': 'PASS' if exit_code == 0 else 'FAIL',
              'stage': '${{ steps.generation.outputs.stage }}',
              'exit_code': exit_code,
              'github_run_id': os.environ['GITHUB_RUN_ID'],
              'source_commit': os.environ['GITHUB_SHA'],
              'cli_source': os.environ['EFFORTLESS_CLI_SOURCE'],
              'log': 'testing/current-effortless-generation.log',
          }
          (domain / 'testing' / 'current-effortless-generation.json').write_text(json.dumps(payload, indent=2) + '\n')
          PY
          rm -f .tsp-effortless-generation-diagnose.trigger
          git add -A -- "$DOMAIN/testing/current-effortless-cli-info.log" "$DOMAIN/testing/current-effortless-prevalidation.log" "$DOMAIN/testing/current-effortless-generation.log" "$DOMAIN/testing/current-effortless-generation.json" .tsp-effortless-generation-diagnose.trigger
          git commit -m 'Record current TSP Effortless generation transcript'
          git pull --rebase origin main
          git push origin HEAD:main
