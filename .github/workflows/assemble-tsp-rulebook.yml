name: Assemble TSP canonical rulebook

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - rulebook-examples/effortless-math/domains/traveling-salesman/.rulebook-parts/**
      - .github/workflows/assemble-tsp-rulebook.yml
  pull_request:
    branches:
      - main
    paths:
      - rulebook-examples/effortless-math/domains/traveling-salesman/.rulebook-parts/**
      - .github/workflows/assemble-tsp-rulebook.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  assemble:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Detect staged parts
        id: parts
        shell: bash
        run: |
          set -euo pipefail
          parts='rulebook-examples/effortless-math/domains/traveling-salesman/.rulebook-parts'
          if compgen -G "$parts/part-*" >/dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble and validate canonical rulebook
        if: steps.parts.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          parts="$domain/.rulebook-parts"
          target="$domain/effortless-rulebook/traveling-salesman-rulebook.json"
          mkdir -p "$(dirname "$target")"
          cat "$parts"/part-* > "$target"
          actual="$(sha256sum "$target" | awk '{print $1}')"
          expected='feae2b448e18ae3b9e77fccfe58e384035ceb7a45d7c38822d7cb0171eca21c4'
          test "$actual" = "$expected"
          python3 "$domain/scripts/validate_rulebook.py"

      - name: Commit canonical asset and remove staging parts
        if: steps.parts.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          rm -rf "$domain/.rulebook-parts"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$domain/effortless-rulebook/traveling-salesman-rulebook.json" "$domain/.rulebook-parts"
          git commit -m 'TSP loops 577-581: materialize canonical rulebook'
          git push origin "HEAD:$TARGET_BRANCH"
