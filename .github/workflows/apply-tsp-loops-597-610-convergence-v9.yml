name: Apply TSP convergence loops 597-610 v9 state-aware

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-convergence-597-610-v9.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-convergence-597-610-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  converge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      TSP_DB: erb_traveling_salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.410'

      - name: Install pinned CLI
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          effortless -info

      - name: Run state-aware convergence executor
        id: execute
        shell: bash
        run: |
          set -uo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          log="$RUNNER_TEMP/tsp-convergence-597-610-v9.log"
          set +e
          python3 "$domain/scripts/apply_loops_597_610_convergence_final2.py" 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist state-aware failure transcript
        if: steps.execute.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp '${{ steps.execute.outputs.log }}' /tmp/tsp-convergence-failure.log
          git reset --hard "origin/$TARGET_BRANCH"
          mkdir -p "$domain/testing"
          cp /tmp/tsp-convergence-failure.log "$domain/testing/convergence-597-610-v9-failure.log"
          cat > "$domain/testing/convergence-597-610-status.json" <<EOF
          {
            "status": "FAILED",
            "driver": "v9-state-aware",
            "github_run_id": "$GITHUB_RUN_ID",
            "exit_code": ${{ steps.execute.outputs.status }},
            "log": "testing/convergence-597-610-v9-failure.log"
          }
          EOF
          git add "$domain/testing/convergence-597-610-v9-failure.log" "$domain/testing/convergence-597-610-status.json"
          git commit -m 'Record state-aware TSP convergence failure transcript'
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
          exit 1

      - name: Record success and push ordered commits
        if: steps.execute.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cat > "$domain/testing/convergence-597-610-status.json" <<EOF
          {
            "status": "SUCCEEDED",
            "driver": "v9-state-aware",
            "github_run_id": "$GITHUB_RUN_ID",
            "last_loop": 610,
            "semantic_basis": "32->8",
            "coined_terms": 14,
            "new_primitives_after_598": 0
          }
          EOF
          git add "$domain/testing/convergence-597-610-status.json"
          git commit -m 'Record TSP convergence 597-610 workflow success'
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
