name: Apply TSP loops 713-812 benchmark campaign

on:
  push:
    branches:
      - agent/tsp_consolidation
    paths:
      - .tsp-campaign-713-812.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-campaign-713-812-${{ github.ref }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TARGET_BRANCH: agent/tsp_consolidation
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      TSP_DB: erb_traveling_salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      PYTHONHASHSEED: '0'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Materialize the campaign driver and validation boundary
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          payload='.github/tsp_campaign_713_812'
          python3 - <<'PY'
          import base64, gzip, hashlib
          from pathlib import Path
          parts = sorted(Path('.github/tsp_campaign_713_812').glob('campaign.gz.b64.part-*'))
          if len(parts) != 4:
              raise AssertionError(f'expected 4 campaign parts, found {len(parts)}')
          encoded = ''.join(part.read_text().strip() for part in parts)
          compressed = base64.b64decode(encoded, validate=True)
          decoded = gzip.decompress(compressed)
          expected = '14ff8506d4ba44521b6c28c4587d3b57a48c409fa30398a913a622b368e388d6'
          actual = hashlib.sha256(decoded).hexdigest()
          if actual != expected:
              raise AssertionError(f'campaign driver hash mismatch: {actual} != {expected}')
          target = Path('rulebook-examples/effortless-math/domains/traveling-salesman/scripts/campaign_713_812.py')
          target.write_bytes(decoded)
          target.chmod(0o755)
          print(f'materialized {target} sha256={actual}')
          PY
          cat > "$domain/scripts/validate_rulebook.py" <<'PY'
          #!/usr/bin/env python3
          import json
          import subprocess
          import sys
          from pathlib import Path

          from validate_rulebook_v3_temporal import main as validate_v3
          from validate_rulebook_v5_temporal import main as validate_v5
          from validate_rulebook_v6 import validate_repository_state as validate_v6
          from validate_summary_alignment_v6 import validate_summary_alignment as validate_summary_v6
          from validate_rulebook_v7 import validate_repository_state as validate_v7
          from validate_summary_alignment_v7 import validate_summary_alignment as validate_summary_v7

          HERE = Path(__file__).resolve().parent
          DOMAIN = HERE.parent
          CALIBRATION_STATUS = DOMAIN / 'testing' / 'calibration-647-710-status.json'
          CALIBRATION_VERIFIED = DOMAIN / 'testing' / 'calibration-647-710-verified.json'
          CALIBRATION_VERIFIER = HERE / 'verify_calibration_647_710.py'
          CAMPAIGN_STATUS = DOMAIN / 'testing' / 'campaign-713-812' / 'status.json'
          CAMPAIGN_DRIVER = HERE / 'campaign_713_812.py'

          def validate_calibration_read_only() -> None:
              if not CALIBRATION_STATUS.is_file() or not CALIBRATION_VERIFIER.is_file():
                  return
              status = json.loads(CALIBRATION_STATUS.read_text())
              if status.get('status') != 'SUCCEEDED' or int(status.get('last_loop', 0)) != 710:
                  return
              prior = CALIBRATION_VERIFIED.read_bytes() if CALIBRATION_VERIFIED.is_file() else None
              try:
                  subprocess.run([sys.executable, str(CALIBRATION_VERIFIER)], check=True)
              finally:
                  if prior is None:
                      CALIBRATION_VERIFIED.unlink(missing_ok=True)
                  else:
                      CALIBRATION_VERIFIED.write_bytes(prior)

          def campaign_is_closed() -> bool:
              if not CAMPAIGN_STATUS.is_file() or not CAMPAIGN_DRIVER.is_file():
                  return False
              status = json.loads(CAMPAIGN_STATUS.read_text())
              return status.get('status') == 'SUCCEEDED' and int(status.get('last_loop', 0)) == 812

          if __name__ == '__main__':
              if campaign_is_closed():
                  subprocess.run([sys.executable, str(CAMPAIGN_DRIVER), '--validate'], check=True)
              else:
                  validate_v3()
                  validate_v5()
                  validate_v6()
                  validate_summary_v6()
                  validate_v7()
                  validate_summary_v7()
                  validate_calibration_read_only()
          PY
          cat > .github/workflows/validate-tsp-domain.yml <<'YML'
          name: Validate TSP domain

          on:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 45
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                - name: Install validation dependencies
                  run: python3 -m pip install 'numpy==2.1.3' 'scipy==1.14.1' 'networkx==3.4.2'
                - name: Validate semantic rulebook and evidence
                  run: |
                    domain='rulebook-examples/effortless-math/domains/traveling-salesman'
                    python3 "$domain/scripts/validate_rulebook.py"
                    find "$domain/scripts" "$domain/testing" -type f -name '*.py' -print0 \
                      | xargs -0 -r python3 -m py_compile
                    bash -n "$domain/start.sh"
                - name: Ensure validation is read-only
                  run: test -z "$(git status --porcelain)"
          YML
          python3 -m py_compile "$domain/scripts/campaign_713_812.py" "$domain/scripts/validate_rulebook.py"

      - name: Configure Git and Python
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          python3 -m pip install --upgrade pip
          python3 -m pip install 'numpy==2.1.3' 'scipy==1.14.1' 'networkx==3.4.2'

      - name: Preregister the complete loop frontier
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          driver="$domain/scripts/campaign_713_812.py"
          python3 "$driver" --plan
          python3 rulebook-examples/effortless-math/scripts/format-rulebook.py \
            "$domain/effortless-rulebook/traveling-salesman-rulebook.json"
          python3 -m json.tool "$domain/problem-contract.json" >/dev/null
          git add -- "$domain" .github/workflows/validate-tsp-domain.yml
          git commit -m 'TSP loops 713-812: preregister frozen TSPLIB campaign'

      - name: Execute the frozen campaign once
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/campaign_713_812.py" --execute \
            | tee /tmp/tsp-campaign-713-812-execution.log

      - name: Close and commit each loop in order
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          driver="$domain/scripts/campaign_713_812.py"
          export PYTHONPATH="$domain/scripts${PYTHONPATH:+:$PYTHONPATH}"
          for loop in $(seq 713 812); do
            python3 "$driver" --apply-loop "$loop"
            python3 rulebook-examples/effortless-math/scripts/format-rulebook.py \
              "$domain/effortless-rulebook/traveling-salesman-rulebook.json"
            name=$(python3 -c "import campaign_713_812 as c; print(c.loop_spec($loop)['name'])")
            git add -- "$domain"
            git commit -m "TSP loop $loop: $name"
          done

      - name: Validate canonical and provider evidence
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/campaign_713_812.py" --validate \
            | tee /tmp/tsp-campaign-713-812-validation.log
          python3 "$domain/scripts/validate_rulebook.py"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pinned Effortless CLI
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          effortless -info

      - name: Rebuild and test generated Postgres
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          bash "$domain/start.sh" build
          bash "$domain/start.sh" db
          bash "$domain/start.sh" test
          psql -h "$PGHOST" -U "$PGUSER" -d "$TSP_DB" -v ON_ERROR_STOP=1 -tA -c \
            "SELECT max(loop_order), count(*) FROM vw_tsp_loops" \
            | tee /tmp/tsp-campaign-713-812-postgres.log
          grep -q '^812|236$' /tmp/tsp-campaign-713-812-postgres.log

      - name: Seal and publish the campaign
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp /tmp/tsp-campaign-713-812-execution.log \
            "$domain/testing/campaign-713-812/execution.log"
          cp /tmp/tsp-campaign-713-812-validation.log \
            "$domain/testing/campaign-713-812/validation.log"
          cp /tmp/tsp-campaign-713-812-postgres.log \
            "$domain/testing/campaign-713-812/postgres.log"
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('rulebook-examples/effortless-math/domains/traveling-salesman/testing/campaign-713-812/postgres-status.json')
          path.write_text(json.dumps({
              'status': 'SUCCEEDED',
              'github_run_id': '${{ github.run_id }}',
              'highest_loop': 812,
              'loop_row_count': 236,
              'database': 'erb_traveling_salesman',
          }, indent=2) + '\n')
          PY
          python3 "$domain/scripts/campaign_713_812.py" --validate
          rm -rf .github/tsp_campaign_713_812
          rm -f .tsp-campaign-713-812.trigger .github/workflows/apply-tsp-campaign-713-812.yml
          git add -A -- "$domain" .github/tsp_campaign_713_812 .tsp-campaign-713-812.trigger .github/workflows/apply-tsp-campaign-713-812.yml
          git commit -m 'TSP loops 713-812: seal replay and Postgres conformance'
          git push origin HEAD:"$TARGET_BRANCH"
