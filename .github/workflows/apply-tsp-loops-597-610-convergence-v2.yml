name: Apply TSP convergence loops 597-610 v2

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-convergence-597-610-v2.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-convergence-597-610-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  converge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      TSP_DB: erb_traveling_salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure ordered loop commits
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.410'

      - name: Install pinned Effortless CLI archive
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          command -v effortless
          effortless -info

      - name: Compile convergence executor
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 -m py_compile "$domain/scripts/apply_loops_597_610_convergence_v2.py"

      - name: Execute and commit loops 597-610
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/apply_loops_597_610_convergence_v2.py"

      - name: Verify ordered loop commits before push
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          expected = [
              'TSP loops 597-610: register convergence experiment',
              'TSP loop 597: record convergence prediction',
              'TSP loop 598: derive eight-predicate basis',
              'TSP loop 599: collapse edge commitment lattice',
              'TSP loop 600: collapse incidence budget',
              'TSP loop 601: derive defect vector',
              'TSP loop 602: derive cut parity',
              'TSP loop 603: derive component repair bound',
              'TSP loop 604: close twin bound sandwich',
              'TSP loop 605: normalize cycle witnesses',
              'TSP loop 606: derive boundary signatures',
              'TSP loop 607: quotient boundary semantics',
              'TSP loop 608: derive component quotient',
              'TSP loop 609: normalize closure events',
              'TSP loop 610: certify convergence event',
          ]
          subjects = subprocess.check_output(['git', 'log', '--format=%s', '--reverse'], text=True).splitlines()
          positions = []
          for message in expected:
              if message not in subjects:
                  raise AssertionError(f'missing commit: {message}')
              positions.append(subjects.index(message))
          if positions != sorted(positions) or len(set(positions)) != len(positions):
              raise AssertionError(f'commit ordering failure: {positions}')
          print('ordered convergence commits: PASS')
          PY

      - name: Push the ordered convergence history
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
