name: Diagnose TSP rulebook validation

on:
  push:
    branches:
      - main
    paths:
      - .tsp-rulebook-diagnose.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DOMAIN: rulebook-examples/effortless-math/domains/traveling-salesman
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run validator and retain complete transcript
        id: validation
        shell: bash
        run: |
          set +e
          python3 "$DOMAIN/scripts/validate_rulebook.py" > /tmp/tsp-rulebook-validation.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/tsp-rulebook-validation.log
          exit 0

      - name: Commit diagnostic certificate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          mkdir -p "$DOMAIN/testing"
          cp /tmp/tsp-rulebook-validation.log "$DOMAIN/testing/current-rulebook-validation.log"
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          domain = Path(os.environ['DOMAIN'])
          exit_code = int('${{ steps.validation.outputs.exit_code }}')
          payload = {
              'status': 'PASS' if exit_code == 0 else 'FAIL',
              'exit_code': exit_code,
              'github_run_id': os.environ['GITHUB_RUN_ID'],
              'source_commit': os.environ['GITHUB_SHA'],
              'command': 'python3 scripts/validate_rulebook.py',
              'transcript': 'testing/current-rulebook-validation.log',
          }
          (domain / 'testing' / 'current-rulebook-validation.json').write_text(json.dumps(payload, indent=2) + '\n')
          PY
          rm -f .tsp-rulebook-diagnose.trigger
          git add -A -- "$DOMAIN/testing/current-rulebook-validation.log" "$DOMAIN/testing/current-rulebook-validation.json" .tsp-rulebook-diagnose.trigger
          git commit -m 'Record current TSP rulebook validation transcript'
          git pull --rebase origin main
          git push origin HEAD:main
