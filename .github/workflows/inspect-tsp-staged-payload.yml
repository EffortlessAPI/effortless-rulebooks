name: Inspect staged TSP loop payload

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-loop-582-586-payload/**
      - .github/workflows/inspect-tsp-staged-payload.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Decode staged payload
        shell: bash
        run: |
          set -euo pipefail
          cat .tsp-loop-582-586-payload/part-* | base64 --decode | gzip --decompress > .tsp-loop-582-586-decoded
          echo "bytes=$(wc -c < .tsp-loop-582-586-decoded)"
          file .tsp-loop-582-586-decoded
      - name: Commit decoded payload
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .tsp-loop-582-586-decoded
          if git diff --cached --quiet; then
            echo 'decoded payload already committed'
            exit 0
          fi
          git commit -m 'Decode staged TSP loop payload for inspection'
          git push origin HEAD:${{ github.ref_name }}
