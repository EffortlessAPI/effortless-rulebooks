name: Inspect staged TSP loop payload

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-loop-582-586-payload/**
      - .github/workflows/inspect-tsp-staged-payload.yml
  pull_request:
    branches:
      - main
    paths:
      - .tsp-loop-582-586-payload/**
      - .github/workflows/inspect-tsp-staged-payload.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode staged payload
        shell: bash
        run: |
          set -euo pipefail
          cat .tsp-loop-582-586-payload/part-* | base64 --decode | gzip --decompress > /tmp/tsp-payload
          echo "bytes=$(wc -c < /tmp/tsp-payload)"
          file /tmp/tsp-payload
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/tsp-payload')
          data = p.read_bytes()
          print('prefix_hex=', data[:32].hex())
          try:
              text = data.decode('utf-8')
          except UnicodeDecodeError:
              print('utf8=false')
          else:
              print('utf8=true')
              print('first_lines:')
              print('\n'.join(text.splitlines()[:20]))
          PY
