name: Apply TSP coherence convergence loops 624-646 v2 temporal

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-coherence-624-646-v2.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-coherence-624-646-${{ github.ref }}
  cancel-in-progress: true

jobs:
  converge:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      TSP_DB: erb_traveling_salesman
      EFFORTLESS_CLI_SOURCE: https://github.com/EffortlessAPI/cli/archive/1551cb82d5a8992ad09e4c82d08e28493f92f7b4.tar.gz
      NPM_CONFIG_PREFIX: /tmp/effortless-npm-global
      NPM_CONFIG_CACHE: /tmp/effortless-npm-cache
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Record durable runner checkpoint
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cat > "$domain/testing/coherence-624-646-status.json" <<EOF
          {
            "status": "RUNNER_STARTED",
            "driver": "coherence-v2-temporal",
            "github_run_id": "$GITHUB_RUN_ID",
            "head_sha": "$GITHUB_SHA"
          }
          EOF
          git add "$domain/testing/coherence-624-646-status.json"
          git commit -m 'Record TSP coherence v2 runner checkpoint'
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.410'

      - name: Install pinned Effortless CLI
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
          mkdir -p "$NPM_CONFIG_PREFIX/bin" "$NPM_CONFIG_PREFIX/lib" "$NPM_CONFIG_CACHE"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          npm install -g "$EFFORTLESS_CLI_SOURCE"
          effortless -info

      - name: Require independently verified loop-623 state
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 - <<'PY'
          import json
          from pathlib import Path
          domain = Path('rulebook-examples/effortless-math/domains/traveling-salesman')
          verified = json.loads((domain/'testing/refinement-611-623-verified.json').read_text())
          if verified.get('status') != 'VERIFIED':
              raise AssertionError(verified)
          rb = json.loads((domain/'effortless-rulebook/traveling-salesman-rulebook.json').read_text())
          loops = {int(row['LoopOrder']): row for row in rb['TSPLoops']['data']}
          if loops[623]['Status'] != 'CLOSED':
              raise AssertionError('loop 623 is not CLOSED')
          print('verified loop-623 prerequisite: PASS')
          PY

      - name: Assemble temporal coherence executor
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          scripts="$domain/scripts"
          output="$scripts/apply_loops_624_646_coherence.py"
          cat \
            "$scripts/coherence_624_646.part1.pyfrag" \
            "$scripts/coherence_624_646.part2.pyfrag" \
            "$scripts/coherence_624_646.part2fix.pyfrag" \
            "$scripts/coherence_624_646.part2fixlate.pyfrag" \
            "$scripts/coherence_624_646.part3.pyfrag" \
            > "$output"
          sed '/^if __name__ == "__main__":$/,$d' \
            "$scripts/coherence_624_646.part4.pyfrag" >> "$output"
          cat "$scripts/coherence_624_646.part5.pyfrag" >> "$output"
          cat >> "$output" <<'PY'

if __name__ == "__main__":
    main()
PY
          python3 -m py_compile "$output"
          git add "$output"
          git diff --cached --quiet || git commit -m 'Assemble temporal TSP coherence executor'
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Execute and publish every remaining coherence loop
        id: execute
        shell: bash
        run: |
          set -uo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          log="$RUNNER_TEMP/tsp-coherence-624-646-v2.log"
          set +e
          python3 "$domain/scripts/apply_loops_624_646_coherence.py" 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist partial-run failure
        if: steps.execute.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp '${{ steps.execute.outputs.log }}' /tmp/tsp-coherence-624-646-v2-failure.log
          git fetch origin "$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"
          cp /tmp/tsp-coherence-624-646-v2-failure.log "$domain/testing/coherence-624-646-failure.log"
          cat > "$domain/testing/coherence-624-646-status.json" <<EOF
          {
            "status": "FAILED",
            "driver": "coherence-v2-temporal",
            "github_run_id": "$GITHUB_RUN_ID",
            "exit_code": ${{ steps.execute.outputs.status }},
            "log": "testing/coherence-624-646-failure.log"
          }
          EOF
          git add "$domain/testing/coherence-624-646-failure.log" "$domain/testing/coherence-624-646-status.json"
          git commit -m 'Record TSP coherence v2 partial failure'
          git push origin HEAD:"$TARGET_BRANCH"
          exit 1

      - name: Record execution success and remove fragments
        if: steps.execute.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cat > "$domain/testing/coherence-624-646-status.json" <<EOF
          {
            "status": "SUCCEEDED",
            "driver": "coherence-v2-temporal",
            "github_run_id": "$GITHUB_RUN_ID",
            "last_loop": 646,
            "active_atoms": ["SEMANTIC_ARC"],
            "active_operators": ["WARRANTED_REWRITE"],
            "physical_tables": 45,
            "three_region_optimum": 36,
            "optimal_face_value": 4,
            "optimal_face_choice_orbit": 2,
            "value_proof_branch_decisions": 0
          }
          EOF
          rm -f \
            "$domain/scripts/coherence_624_646.part1.pyfrag" \
            "$domain/scripts/coherence_624_646.part2.pyfrag" \
            "$domain/scripts/coherence_624_646.part2fix.pyfrag" \
            "$domain/scripts/coherence_624_646.part2fixlate.pyfrag" \
            "$domain/scripts/coherence_624_646.part3.pyfrag" \
            "$domain/scripts/coherence_624_646.part4.pyfrag" \
            "$domain/scripts/coherence_624_646.part5.pyfrag"
          rm -f "$domain/testing/coherence-624-646-failure.log"
          git add -A -- "$domain"
          git commit -m 'Record TSP coherence convergence loops 624-646 success'
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
