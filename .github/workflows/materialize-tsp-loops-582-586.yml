name: Materialize TSP loops 582-586

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-loop-582-586-payload/**
      - .github/workflows/materialize-tsp-loops-582-586.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Decode and identify canonical payload
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          target="$domain/effortless-rulebook/traveling-salesman-rulebook.json"
          decoded='/tmp/traveling-salesman-rulebook.json'
          cat .tsp-loop-582-586-payload/part-* | base64 --decode | gzip --decompress > "$decoded"
          python3 -m json.tool "$decoded" >/dev/null
          expected="$(python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('rulebook-examples/effortless-math/domains/traveling-salesman/problem-contract.json')
          value = json.loads(p.read_text())['ArtifactHashes']['rulebook']
          if not value.startswith('sha256:'):
              raise SystemExit(f'unsupported contract hash: {value}')
          print(value.split(':', 1)[1])
          PY
          )"
          actual="$(sha256sum "$decoded" | awk '{print $1}')"
          echo "decoded_sha256=$actual"
          test "$actual" = "$expected"
          cp "$decoded" "$target"

      - name: Validate loops 582-586
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/validate_rulebook.py"
          python3 -m py_compile \
            "$domain/scripts/reference_model.py" \
            "$domain/scripts/validate_rulebook.py" \
            "$domain/testing/take-test.py"
          bash -n "$domain/start.sh"

      - name: Commit canonical rulebook and remove staging artifacts
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          rm -rf .tsp-loop-582-586-payload .tsp-loop-582-586-migration
          rm -f .tsp-loop-582-586-decoded
          rm -f .github/workflows/inspect-tsp-staged-payload.yml
          rm -f .github/workflows/materialize-tsp-loops-582-586.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$domain/effortless-rulebook/traveling-salesman-rulebook.json" \
                  .tsp-loop-582-586-payload \
                  .tsp-loop-582-586-migration \
                  .tsp-loop-582-586-decoded \
                  .github/workflows/inspect-tsp-staged-payload.yml \
                  .github/workflows/materialize-tsp-loops-582-586.yml
          git commit -m 'Finished TSP loops 582-586: obligations, cycle closure, lower bound, optimality'
          git push origin HEAD:${{ github.ref_name }}
