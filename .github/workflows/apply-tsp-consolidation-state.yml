name: Apply TSP consolidation state

on:
  push:
    branches:
      - agent/tsp_consolidation
    paths:
      - .tsp-consolidate-state.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tsp-consolidation-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  consolidate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsp_consolidation
          fetch-depth: 0

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Correct repository-root discovery
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          for file in \
            "$domain/scripts/reconcile_summary.py" \
            "$domain/scripts/validate_consolidation.py" \
            "$domain/scripts/audit_loop_history.py"; do
            sed -i 's/DOMAIN\.parents\[4\]/DOMAIN.parents[3]/g' "$file"
          done

      - name: Audit ordered semantic history
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/audit_loop_history.py"

      - name: Reconcile contract, provenance, and artifact lifecycle
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          before=$(python3 -c "import hashlib; from pathlib import Path; p=Path('$domain/effortless-rulebook/traveling-salesman-rulebook.json'); print(hashlib.sha256(p.read_bytes()).hexdigest())")
          python3 "$domain/scripts/reconcile_summary.py"
          after=$(python3 -c "import hashlib; from pathlib import Path; p=Path('$domain/effortless-rulebook/traveling-salesman-rulebook.json'); print(hashlib.sha256(p.read_bytes()).hexdigest())")
          test "$before" = "$after"

      - name: Validate consolidated state before build certificate
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/validate_consolidation.py" --require-history-audit
          find "$domain/scripts" "$domain/testing" -type f -name '*.py' -print0 \
            | xargs -0 -r python3 -m py_compile
          bash -n "$domain/start.sh"

      - name: Commit reconciled non-README state
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          rm -f .tsp-consolidate-state.trigger
          git add \
            "$domain/scripts/reconcile_summary.py" \
            "$domain/scripts/validate_consolidation.py" \
            "$domain/scripts/audit_loop_history.py" \
            "$domain/problem-contract.json" \
            "$domain/testing/consolidation" \
            .tsp-consolidate-state.trigger
          git commit -m 'Consolidate TSP ledger projections and evidence boundaries'
          git pull --rebase origin agent/tsp_consolidation
          git push origin HEAD:agent/tsp_consolidation
