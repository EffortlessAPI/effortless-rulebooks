name: Repair historical TSP validators for cumulative replay

on:
  push:
    branches:
      - agent/tsp_consolidation
    paths:
      - .tsp-repair-historical-validators.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PYTHONHASHSEED: '0'
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsp_consolidation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'

      - name: Install pinned validator dependencies
        run: |
          python3 -m pip install --quiet \
            'numpy==2.1.3' \
            'scipy==1.14.1' \
            'networkx==3.4.2' \
            'psycopg2-binary==2.9.10'

      - name: Make loop-647-710 validators cumulative-compatible
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          domain = Path('rulebook-examples/effortless-math/domains/traveling-salesman')

          def lines(*items: str) -> str:
              return '\n'.join(items)

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise AssertionError(f'{label}: expected one exact block, found {count}')
              return text.replace(old, new, 1)

          apply_path = domain / 'scripts' / 'apply_loops_647_710_calibration.py'
          text = apply_path.read_text()
          text = replace_once(
              text,
              lines(
                  '    if sorted(loop_map) != list(range(577, 711)):',
                  '        raise AssertionError(f"loop sequence is not contiguous through 710: {min(loop_map)}..{max(loop_map)} count={len(loop_map)}")',
              ),
              lines(
                  '    required_loop_orders = set(range(577, 711))',
                  '    missing_loop_orders = sorted(required_loop_orders - set(loop_map))',
                  '    if missing_loop_orders:',
                  '        raise AssertionError(',
                  '            f"loop sequence is missing required history through 710: {missing_loop_orders}"',
                  '        )',
              ),
              'apply-loop exact boundary',
          )
          text = replace_once(
              text,
              lines(
                  '    if closed(709):',
                  '        if "loop_709_postgres_projection_tree" not in contract.get("ArtifactHashes", {}):',
                  '            raise AssertionError("loop-709 live Postgres artifact hash missing")',
              ),
              lines(
                  '    if closed(709):',
                  '        legacy_hashes = contract.get("ArtifactHashes", {})',
                  '        if "loop_709_postgres_projection_tree" not in legacy_hashes:',
                  '            lifecycle_path = contract.get("ArtifactLifecycle", {}).get("path")',
                  '            if not lifecycle_path:',
                  '                raise AssertionError("loop-709 live Postgres artifact lifecycle is missing")',
                  '            lifecycle = load(DOMAIN / lifecycle_path)',
                  '            historical = lifecycle.get("historical_loop_artifacts", {})',
                  '            if "loop_709_postgres_projection_tree" not in historical:',
                  '                raise AssertionError("loop-709 historical Postgres artifact hash missing")',
              ),
              'apply-loop artifact lifecycle',
          )
          apply_path.write_text(text)

          verify_path = domain / 'scripts' / 'verify_calibration_647_710.py'
          text = verify_path.read_text()
          text = replace_once(
              text,
              lines(
                  'VERIFIED = DOMAIN / "testing" / "calibration-647-710-verified.json"',
                  'sys.path.insert(0, str(HERE))',
              ),
              lines(
                  'VERIFIED = DOMAIN / "testing" / "calibration-647-710-verified.json"',
                  'HISTORY_MODE = DOMAIN / "testing" / "calibration-history-mode.json"',
                  'sys.path.insert(0, str(HERE))',
              ),
              'verifier history-mode constant',
          )
          text = replace_once(
              text,
              lines(
                  '    if sorted(loops) != list(range(577, 711)):',
                  '        raise AssertionError(f"loop sequence mismatch: {min(loops)}..{max(loops)} count={len(loops)}")',
              ),
              lines(
                  '    required_loop_orders = set(range(577, 711))',
                  '    missing_loop_orders = sorted(required_loop_orders - set(loops))',
                  '    if missing_loop_orders:',
                  '        raise AssertionError(f"required calibration history is missing: {missing_loop_orders}")',
              ),
              'verifier exact boundary',
          )
          text = replace_once(
              text,
              lines(
                  '    subjects = subprocess.check_output(["git", "log", "--format=%s", "--reverse"], text=True).splitlines()',
                  '    plan_message = "TSP loops 647-710: register frozen-basis exact calibration"',
                  '    expected = [plan_message, *EXPECTED_LOOP_COMMITS]',
                  '    positions: list[int] = []',
                  '    for message in expected:',
                  '        if message not in subjects:',
                  '            raise AssertionError(f"missing calibration commit: {message}")',
                  '        positions.append(subjects.index(message))',
                  '    if positions != sorted(positions) or len(set(positions)) != len(positions):',
                  '        raise AssertionError(f"calibration commits are not strictly ordered: {positions}")',
                  '',
                  '    payload = {',
              ),
              lines(
                  '    history = load(HISTORY_MODE) if HISTORY_MODE.is_file() else {}',
                  '    history_mode = history.get("mode", "DETAILED_GIT_HISTORY")',
                  '    positions: list[int] = []',
                  '    ordered_commit_history_verified = False',
                  '    canonical_ledger_history_verified = False',
                  '    if history_mode == "SQUASHED_CANONICAL_LEDGER":',
                  '        if history.get("detailed_git_commit_history_required") is not False:',
                  '            raise AssertionError("squashed calibration history must disable commit-subject dependence")',
                  '        if history.get("required_loop_range") != "647-710":',
                  '            raise AssertionError(f"unexpected calibration history range: {history!r}")',
                  '        canonical_ledger_history_verified = True',
                  '    else:',
                  '        subjects = subprocess.check_output(["git", "log", "--format=%s", "--reverse"], text=True).splitlines()',
                  '        plan_message = "TSP loops 647-710: register frozen-basis exact calibration"',
                  '        expected = [plan_message, *EXPECTED_LOOP_COMMITS]',
                  '        for message in expected:',
                  '            if message not in subjects:',
                  '                raise AssertionError(f"missing calibration commit: {message}")',
                  '            positions.append(subjects.index(message))',
                  '        if positions != sorted(positions) or len(set(positions)) != len(positions):',
                  '            raise AssertionError(f"calibration commits are not strictly ordered: {positions}")',
                  '        ordered_commit_history_verified = True',
                  '',
                  '    payload = {',
              ),
              'verifier history replay',
          )
          text = replace_once(
              text,
              lines(
                  '        "general_tsp_algorithm_proved": False,',
                  '        "ordered_commit_positions": positions,',
                  '    }',
              ),
              lines(
                  '        "general_tsp_algorithm_proved": False,',
                  '        "history_mode": history_mode,',
                  '        "ordered_commit_history_verified": ordered_commit_history_verified,',
                  '        "canonical_ledger_history_verified": canonical_ledger_history_verified,',
                  '        "ordered_commit_positions": positions,',
                  '    }',
              ),
              'verifier certificate fields',
          )
          verify_path.write_text(text)
          PY

      - name: Replay repaired historical validators
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 -m py_compile \
            "$domain/scripts/apply_loops_647_710_calibration.py" \
            "$domain/scripts/verify_calibration_647_710.py"
          python3 "$domain/scripts/validate_rulebook_v7.py"
          python3 "$domain/scripts/verify_calibration_647_710.py"
          python3 "$domain/scripts/validate_consolidation.py" --require-history-audit

      - name: Commit cumulative-compatible validators
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .tsp-repair-historical-validators.trigger
          git add \
            "$domain/scripts/apply_loops_647_710_calibration.py" \
            "$domain/scripts/verify_calibration_647_710.py" \
            "$domain/testing/calibration-647-710-verified.json" \
            .tsp-repair-historical-validators.trigger
          git commit -m 'Make historical TSP validators cumulative-compatible'
          git pull --rebase origin agent/tsp_consolidation
          git push origin HEAD:agent/tsp_consolidation
