name: Apply TSP loops 582-586

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-loop-582-586-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Assemble one-shot migration
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          parts='.tsp-loop-582-586-migration'
          target="$domain/scripts/apply_loops_582_586.py"
          cat "$parts"/part-* > "$target"
          chmod +x "$target"
          python3 -m py_compile "$target"

      - name: Apply loops and validate semantic certificates
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 "$domain/scripts/apply_loops_582_586.py"
          python3 "$domain/scripts/validate_rulebook.py"
          python3 -m py_compile \
            "$domain/scripts/apply_loops_582_586.py" \
            "$domain/scripts/reference_model.py" \
            "$domain/scripts/validate_rulebook.py" \
            "$domain/testing/take-test.py"
          bash -n "$domain/start.sh"
          actual="$(sha256sum "$domain/effortless-rulebook/traveling-salesman-rulebook.json" | awk '{print $1}')"
          expected='133be28b3d9a32e25fedfe7817a808d0ba2033257d8de39f4578a6f7d857dc5f'
          test "$actual" = "$expected"

      - name: Commit canonical loop results and remove staging payloads
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          rm -rf .tsp-loop-582-586-migration .tsp-loop-582-586-payload .tsp-loop-582-586-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- "$domain" .tsp-loop-582-586-migration .tsp-loop-582-586-payload .tsp-loop-582-586-trigger
          git commit -m 'Finished Loops 582-586 - TSP frontier obligations and finite optimality'
          git push origin HEAD:${{ github.ref_name }}
