name: Verify TSP convergence loops 597-610 v3 canonical witnesses

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-convergence-597-610-verify-v3.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-tsp-convergence-597-610-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure certificate commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Record verifier checkpoint
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "RUNNER_STARTED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v3-canonical-witnesses"
          }
          EOF
          git add "$domain/testing/convergence-597-610-verification-status.json"
          git commit -m 'Record TSP convergence verifier v3 checkpoint'
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Verify canonical witness rows
        id: audit
        shell: bash
        run: |
          set -uo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          log="$RUNNER_TEMP/tsp-convergence-verifier-v3.log"
          set +e
          (
            set -e
            python3 "$domain/scripts/validate_rulebook.py"
            python3 "$domain/scripts/verify_convergence_597_610.py"
          ) 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist canonical verifier failure
        if: steps.audit.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp '${{ steps.audit.outputs.log }}' /tmp/tsp-convergence-verifier-v3-failure.log
          git fetch origin "$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"
          cp /tmp/tsp-convergence-verifier-v3-failure.log "$domain/testing/convergence-597-610-verification-failure.log"
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "FAILED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v3-canonical-witnesses",
            "log": "testing/convergence-597-610-verification-failure.log"
          }
          EOF
          git add "$domain/testing/convergence-597-610-verification-failure.log" "$domain/testing/convergence-597-610-verification-status.json"
          git commit -m 'Record TSP convergence verifier v3 failure'
          git push origin HEAD:"$TARGET_BRANCH"
          exit 1

      - name: Commit canonical verification certificate
        if: steps.audit.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 - <<PY
          import json
          from pathlib import Path
          path = Path('$domain/testing/convergence-597-610-verified.json')
          value = json.loads(path.read_text())
          value['github_run_id'] = '$GITHUB_RUN_ID'
          path.write_text(json.dumps(value, indent=2) + '\n')
          PY
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "VERIFIED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v3-canonical-witnesses"
          }
          EOF
          rm -f "$domain/testing/convergence-597-610-verification-failure.log"
          git add -A -- "$domain/testing/convergence-597-610-verified.json" "$domain/testing/convergence-597-610-verification-status.json" "$domain/testing/convergence-597-610-verification-failure.log"
          git commit -m 'Verify TSP convergence loops 597-610'
          git push origin HEAD:"$TARGET_BRANCH"
