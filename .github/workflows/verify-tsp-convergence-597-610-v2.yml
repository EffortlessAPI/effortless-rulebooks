name: Verify TSP convergence loops 597-610 v2 checkpointed

on:
  push:
    branches:
      - agent/tsp-semantic-foundation
    paths:
      - .tsp-convergence-597-610-verify-v2.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-tsp-convergence-597-610-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: agent/tsp-semantic-foundation
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure certificate commits
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Record verifier checkpoint
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "RUNNER_STARTED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v2-checkpointed"
          }
          EOF
          git add "$domain/testing/convergence-597-610-verification-status.json"
          git commit -m 'Record TSP convergence verifier checkpoint'
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Independently validate canonical convergence state
        id: audit
        shell: bash
        run: |
          set -uo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          log="$RUNNER_TEMP/tsp-convergence-verifier.log"
          set +e
          (
            set -e
            python3 "$domain/scripts/validate_rulebook.py"
            python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          domain = Path('rulebook-examples/effortless-math/domains/traveling-salesman')
          status = json.loads((domain / 'testing/convergence-597-610-status.json').read_text())
          if status.get('status') != 'SUCCEEDED':
              raise AssertionError(f'executor status is {status.get("status")!r}')

          rb = json.loads((domain / 'effortless-rulebook/traveling-salesman-rulebook.json').read_text())
          contract = json.loads((domain / 'problem-contract.json').read_text())
          loops = {int(row['LoopOrder']): row for row in rb['TSPLoops']['data']}
          if sorted(loops) != list(range(577, 611)):
              raise AssertionError(f'loop sequence mismatch: {min(loops)}..{max(loops)}, count={len(loops)}')
          if any(loops[n]['Status'] != 'CLOSED' for n in range(597, 611)):
              raise AssertionError('not every convergence loop is CLOSED')
          if any(not loops[n].get('BeforeState') or not loops[n].get('AfterState') for n in range(597, 611)):
              raise AssertionError('before/after convergence history is incomplete')

          concepts = rb['TSPConceptRegistry']['data']
          primitive_count = sum(row['ConceptKind'] == 'PRIMITIVE' for row in concepts)
          coined_count = sum(row['ConceptKind'] == 'COINED_PREDICATE' for row in concepts)
          print(f'primitive_count={primitive_count} coined_count={coined_count}')
          if primitive_count != 8:
              raise AssertionError(f'primitive basis count is {primitive_count}, expected 8')
          if coined_count != 14:
              raise AssertionError(f'coined predicate count is {coined_count}, expected 14')
          if contract['Claims'].get('SemanticCompressionPct') != 75:
              raise AssertionError(f"semantic compression={contract['Claims'].get('SemanticCompressionPct')!r}")
          if contract['Claims'].get('TwinTrianglesOptimalityProved') is not True:
              raise AssertionError('twin-triangles finite optimality certificate is missing')
          if contract['Claims'].get('ConceptConvergenceProved') is not False:
              raise AssertionError('empirical convergence was promoted to a theorem')

          bounds = {row['InstanceLowerBoundId']: row for row in rb['InstanceLowerBounds']['data']}
          twin = bounds['degree-two-lower-bound-twin-triangles-6']
          print(f"twin_base={twin.get('BaseLowerBoundCost')!r} twin_adjustment={twin.get('SupplementalBoundAdjustment')!r}")
          if float(twin['BaseLowerBoundCost']) != 6 or float(twin['SupplementalBoundAdjustment']) != 18:
              raise AssertionError('twin repair-bound composition mismatch')

          subjects = subprocess.check_output(['git', 'log', '--format=%s', '--reverse'], text=True).splitlines()
          expected = [
              'TSP loops 597-610: register convergence experiment',
              'TSP loop 597: record convergence prediction',
              'TSP loop 598: define predicate basis',
              'TSP loop 599: unify commitment lattice',
              'TSP loop 600: unify incidence budget',
              'TSP loop 601: define defect vector',
              'TSP loop 602: certify cut parity',
              'TSP loop 603: derive component repair bound',
              'TSP loop 604: close twin bound sandwich',
              'TSP loop 605: normalize witness forms',
              'TSP loop 606: define boundary signatures',
              'TSP loop 607: certify semantic quotient',
              'TSP loop 608: unify component quotient',
              'TSP loop 609: normalize closure events',
              'TSP loop 610: record convergence event',
          ]
          positions = []
          for message in expected:
              if message not in subjects:
                  raise AssertionError(f'missing convergence commit: {message}')
              positions.append(subjects.index(message))
          print(f'commit_positions={positions}')
          if positions != sorted(positions) or len(set(positions)) != len(positions):
              raise AssertionError(f'convergence commits are not strictly ordered: {positions}')

          payload = {
              'status': 'VERIFIED',
              'github_run_id': None,
              'loops': '597-610',
              'primitive_basis_count': primitive_count,
              'surface_predicate_baseline': 32,
              'semantic_compression_pct': 75,
              'coined_predicates': coined_count,
              'twin_optimality': True,
              'concept_convergence_proved': False,
          }
          (domain / 'testing/convergence-597-610-verified.json').write_text(json.dumps(payload, indent=2) + '\n')
          print('independent TSP convergence verification: PASS')
          PY
          ) 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist exact verifier failure
        if: steps.audit.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          cp '${{ steps.audit.outputs.log }}' /tmp/tsp-convergence-verifier-failure.log
          git fetch origin "$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"
          cp /tmp/tsp-convergence-verifier-failure.log "$domain/testing/convergence-597-610-verification-failure.log"
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "FAILED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v2-checkpointed",
            "log": "testing/convergence-597-610-verification-failure.log"
          }
          EOF
          git add "$domain/testing/convergence-597-610-verification-failure.log" "$domain/testing/convergence-597-610-verification-status.json"
          git commit -m 'Record TSP convergence verifier failure'
          git push origin HEAD:"$TARGET_BRANCH"
          exit 1

      - name: Commit independent convergence certificate
        if: steps.audit.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          domain='rulebook-examples/effortless-math/domains/traveling-salesman'
          python3 - <<PY
          import json
          from pathlib import Path
          path = Path('$domain/testing/convergence-597-610-verified.json')
          value = json.loads(path.read_text())
          value['github_run_id'] = '$GITHUB_RUN_ID'
          path.write_text(json.dumps(value, indent=2) + '\n')
          PY
          cat > "$domain/testing/convergence-597-610-verification-status.json" <<EOF
          {
            "status": "VERIFIED",
            "github_run_id": "$GITHUB_RUN_ID",
            "verifier": "v2-checkpointed"
          }
          EOF
          git add "$domain/testing/convergence-597-610-verified.json" "$domain/testing/convergence-597-610-verification-status.json"
          git commit -m 'Verify TSP convergence loops 597-610'
          git push origin HEAD:"$TARGET_BRANCH"
