<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <radialGradient id="orb-airtable" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9B8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#F0A030" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#BA7517" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-xlsx" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8FAC8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#88C935" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#3B6D11" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-legacy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EDE4D8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#9C8568" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#5A4632" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Master cycle timer: 16 segments × 1.0s = 16s
       Loops 1-3 (normal):  A→R, R→FE, FE→A
       Loop 4 (excursion):  A→R, R→Spreads, Spreads→R, R→Legacy, Legacy→R, R→FE, FE→A -->
  <rect width="0" height="0" opacity="0">
    <animate id="cycle" begin="0s;cycle.end" dur="16s" attributeName="x" from="0" to="0"/>
  </rect>

  <!-- Background -->
  <rect width="680" height="520" fill="#FAFAF8" rx="8"/>

  <!-- Section labels -->
  <text x="100" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7" font-style="italic">Single source of truth</text>
  <text x="570" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#888780" font-style="italic">Hand-built stack layers</text>

  <!-- === FRONT END (above the rulebook) === -->
  <rect x="260" y="70" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.6"/>
  <text x="340" y="90" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">Front End UI/UX</text>
  <text x="340" y="108" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">React · Vue · Tailwind · Figma</text>

  <!-- === Hub glow === -->
  <rect x="224" y="204" width="232" height="72" rx="16" fill="#534AB7" opacity=".1">
    <animate attributeName="opacity" values=".06;.18;.06" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- === Central hub: Effortless rulebook === -->
  <rect x="230" y="210" width="220" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="234" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Effortless rulebook</text>
  <text x="340" y="253" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7">Declarative hub</text>

  <!-- Hub flash (fires when orb arrives at rulebook) -->
  <rect x="230" y="210" width="220" height="60" rx="12" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity"
             begin="cycle.begin+1s; cycle.begin+4s; cycle.begin+7s; cycle.begin+10s; cycle.begin+12s; cycle.begin+14s"
             dur="0.45s" values="0;0.65;0" keyTimes="0;0.3;1"/>
  </rect>
  <rect x="230" y="210" width="220" height="60" rx="12" fill="none" stroke="#534AB7" stroke-width="3" opacity="0">
    <animate attributeName="opacity"
             begin="cycle.begin+1s; cycle.begin+4s; cycle.begin+7s; cycle.begin+10s; cycle.begin+12s; cycle.begin+14s"
             dur="0.45s" values="0;0.85;0" keyTimes="0;0.3;1"/>
  </rect>

  <!-- === LEFT SIDE: Source-of-truth portal + extras === -->

  <!-- Airtable -->
  <rect x="20" y="150" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.6"/>
  <text x="100" y="170" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">Airtable</text>
  <text x="100" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#854F0B">Source of truth</text>

  <!-- Spreadsheets / No-Code n-stack -->
  <rect x="32" y="266" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5" opacity=".35"/>
  <rect x="26" y="274" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5" opacity=".55"/>
  <rect x="20" y="282" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.7"/>
  <text x="100" y="302" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#27500A">Spreadsheets / No-Code</text>
  <text x="100" y="320" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#3B6D11">XLSX · Sheets · Knack · etc.</text>

  <!-- Legacy Systems n-stack -->
  <rect x="32" y="382" width="160" height="56" rx="8" fill="#F0EAE0" stroke="#8C6E48" stroke-width="0.5" opacity=".35"/>
  <rect x="26" y="390" width="160" height="56" rx="8" fill="#F0EAE0" stroke="#8C6E48" stroke-width="0.5" opacity=".55"/>
  <rect x="20" y="398" width="160" height="56" rx="8" fill="#F0EAE0" stroke="#8C6E48" stroke-width="0.7"/>
  <text x="100" y="418" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#4A3923">Legacy Systems</text>
  <text x="100" y="436" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#6B5235">COBOL · AS/400 · mainframe</text>

  <!-- === Big-circle paths (visible arrows) === -->
  <!-- 1. Airtable → Rulebook (out the BOTTOM of airtable, into LEFT edge of rulebook) -->
  <path id="p-air-rule" d="M100 206 Q140 250 230 240" fill="none" stroke="#BA7517" stroke-width="1.4" opacity=".6" marker-end="url(#arrow)"/>
  <!-- 2. Rulebook → Front End (straight up) -->
  <path id="p-rule-fe" d="M340 210 L340 130" fill="none" stroke="#BA7517" stroke-width="1.4" opacity=".6" marker-end="url(#arrow)"/>
  <!-- 3. Front End → Airtable (sweep down-left) -->
  <path id="p-fe-air" d="M260 100 Q160 130 100 150" fill="none" stroke="#BA7517" stroke-width="1.4" opacity=".6" marker-end="url(#arrow)"/>

  <!-- Excursion paths (dotted, only used on the 4th loop) -->
  <path id="p-rule-spreads" d="M260 268 Q220 280 195 290" fill="none" stroke="#639922" stroke-width="1" opacity=".45" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <path id="p-spreads-rule" d="M195 300 Q230 280 270 268" fill="none" stroke="#639922" stroke-width="1" opacity=".45" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <path id="p-rule-legacy"  d="M270 270 Q220 360 195 406" fill="none" stroke="#8C6E48" stroke-width="1" opacity=".45" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <path id="p-legacy-rule"  d="M195 416 Q260 360 280 270" fill="none" stroke="#8C6E48" stroke-width="1" opacity=".45" marker-end="url(#arrow)" stroke-dasharray="3 3"/>

  <!-- === RIGHT SIDE: Hand-built stack layers === -->

  <!-- Documentation -->
  <rect x="495" y="60" width="160" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="575" y="76" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#633806">Documentation</text>
  <text x="575" y="94" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="9" fill="#854F0B">Markdown · Docusaurus · OpenAPI</text>
  <path id="p-docs" d="M450 220 Q480 220 495 92" fill="none" stroke="#BA7517" stroke-width="1" opacity=".5" marker-end="url(#arrow)"/>

  <!-- REST API -->
  <rect x="495" y="148" width="160" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="575" y="164" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">REST API</text>
  <text x="575" y="182" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="9" fill="#534AB7">Express · FastAPI · .NET · Spring</text>
  <path id="p-rest" d="M450 232 Q472 232 495 172" fill="none" stroke="#534AB7" stroke-width="1" opacity=".5" marker-end="url(#arrow)"/>

  <!-- Row Level Security -->
  <rect x="495" y="236" width="160" height="48" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="575" y="252" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#27500A">Row Level Security</text>
  <text x="575" y="270" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="9" fill="#3B6D11">Postgres RLS · policies · tenant isolation</text>
  <path id="p-rls" d="M450 248 Q478 248 495 260" fill="none" stroke="#639922" stroke-width="1" opacity=".5" marker-end="url(#arrow)"/>

  <!-- Storage -->
  <rect x="495" y="324" width="160" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="575" y="340" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041">Storage</text>
  <text x="575" y="358" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="9" fill="#0F6E56">PostgreSQL · S3 · Redis · Mongo</text>
  <path id="p-storage" d="M450 256 Q482 256 495 348" fill="none" stroke="#1D9E75" stroke-width="1" opacity=".5" marker-end="url(#arrow)"/>

  <!-- Testing / Automated QA -->
  <rect x="495" y="412" width="160" height="48" rx="8" fill="#F3E8FB" stroke="#8B3FCB" stroke-width="0.5"/>
  <text x="575" y="428" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3D1758">Testing / Automated QA</text>
  <text x="575" y="446" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="9" fill="#5B2280">Jest · Pytest · Playwright · Cypress</text>
  <path id="p-test" d="M450 262 Q485 262 495 436" fill="none" stroke="#8B3FCB" stroke-width="1" opacity=".5" marker-end="url(#arrow)"/>

  <!-- === Glowing orb cycle (16 segments) ===
       t=0   A→R          (loop 1)
       t=1   R→FE
       t=2   FE→A
       t=3   A→R          (loop 2)
       t=4   R→FE
       t=5   FE→A
       t=6   A→R          (loop 3)
       t=7   R→FE
       t=8   FE→A
       t=9   A→R          (loop 4 — excursion)
       t=10  R→Spreads
       t=11  Spreads→R
       t=12  R→Legacy
       t=13  Legacy→R
       t=14  R→FE
       t=15  FE→A
  -->

  <!-- Loop 1 -->
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+0s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+0s" dur="1s"><mpath href="#p-air-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+1s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+1s" dur="1s"><mpath href="#p-rule-fe"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+2s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+2s" dur="1s"><mpath href="#p-fe-air"/></animateMotion>
  </circle>

  <!-- Loop 2 -->
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+3s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+3s" dur="1s"><mpath href="#p-air-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+4s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+4s" dur="1s"><mpath href="#p-rule-fe"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+5s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+5s" dur="1s"><mpath href="#p-fe-air"/></animateMotion>
  </circle>

  <!-- Loop 3 -->
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+6s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+6s" dur="1s"><mpath href="#p-air-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+7s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+7s" dur="1s"><mpath href="#p-rule-fe"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+8s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+8s" dur="1s"><mpath href="#p-fe-air"/></animateMotion>
  </circle>

  <!-- Loop 4 — Spreadsheets + Legacy excursion -->
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+9s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+9s" dur="1s"><mpath href="#p-air-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-xlsx)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+10s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+10s" dur="1s"><mpath href="#p-rule-spreads"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-xlsx)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+11s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+11s" dur="1s"><mpath href="#p-spreads-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-legacy)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+12s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+12s" dur="1s"><mpath href="#p-rule-legacy"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-legacy)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+13s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+13s" dur="1s"><mpath href="#p-legacy-rule"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+14s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+14s" dur="1s"><mpath href="#p-rule-fe"/></animateMotion>
  </circle>
  <circle r="9" fill="url(#orb-airtable)" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" begin="cycle.begin+15s" dur="1s" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    <animateMotion begin="cycle.begin+15s" dur="1s"><mpath href="#p-fe-air"/></animateMotion>
  </circle>

  <!-- === Animated particles: stack layers (right side) === -->
  <circle r="2.5" fill="#BA7517">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.2s" repeatCount="indefinite" begin="0.1s"/>
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.1s"><mpath href="#p-docs"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#534AB7">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.4s" repeatCount="indefinite" begin="0.2s"/>
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.2s"><mpath href="#p-rest"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#639922">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#p-rls"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#1D9E75">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.7s" repeatCount="indefinite" begin="0.3s"/>
    <animateMotion dur="2.7s" repeatCount="indefinite" begin="0.3s"><mpath href="#p-storage"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#8B3FCB">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.6s"><mpath href="#p-test"/></animateMotion>
  </circle>
</svg>
