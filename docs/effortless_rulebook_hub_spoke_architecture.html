
<style>
  @keyframes pulseOut { 0%{offset-distance:0%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{offset-distance:100%;opacity:0} }
  @keyframes pulseIn { 0%{offset-distance:100%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{offset-distance:0%;opacity:0} }
  @keyframes hubGlow { 0%,100%{opacity:.12} 50%{opacity:.25} }
  .dot-out { width:6px;height:6px;border-radius:50%;position:absolute;animation: pulseOut 2.4s linear infinite; }
  .dot-in  { width:6px;height:6px;border-radius:50%;position:absolute;animation: pulseIn 2.8s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .dot-out,.dot-in { animation: none; opacity:0; } }
</style>
