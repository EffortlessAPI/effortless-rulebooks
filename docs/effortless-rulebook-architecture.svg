<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#FAFAF8" rx="8"/>

  <!-- Section labels -->
  <text x="100" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7" font-style="italic">Bidirectional portals</text>
  <text x="570" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#888780" font-style="italic">Read-only projections</text>

  <!-- Hub glow -->
  <rect x="224" y="204" width="232" height="72" rx="16" fill="#534AB7" opacity=".1">
    <animate attributeName="opacity" values=".06;.18;.06" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Central hub -->
  <rect x="230" y="210" width="220" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="234" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Effortless rulebook</text>
  <text x="340" y="253" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7">Declarative hub</text>

  <!-- === LEFT SIDE: Bidirectional portals === -->

  <!-- Airtable -->
  <rect x="20" y="70" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="100" y="90" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">Airtable</text>
  <text x="100" y="108" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#854F0B">Source of truth</text>
  <path id="p-airtable" d="M180 98 Q240 98 260 210" fill="none" stroke="#BA7517" stroke-width="1" opacity=".5" marker-end="url(#arrow)" marker-start="url(#arrowR)"/>

  <!-- XLSX -->
  <rect x="20" y="160" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="100" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#27500A">XLSX</text>
  <text x="100" y="198" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#3B6D11">Spreadsheet editing</text>
  <path id="p-xlsx" d="M180 188 Q215 188 230 220" fill="none" stroke="#639922" stroke-width="1" opacity=".5" marker-end="url(#arrow)" marker-start="url(#arrowR)"/>

  <!-- Baserow -->
  <rect x="20" y="290" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="100" y="310" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">Baserow</text>
  <text x="100" y="328" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#0F6E56">Open-source DB UI</text>
  <path id="p-baserow" d="M180 318 Q215 318 230 260" fill="none" stroke="#1D9E75" stroke-width="1" opacity=".5" marker-end="url(#arrow)" marker-start="url(#arrowR)"/>

  <!-- PostgreSQL -->
  <rect x="20" y="384" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="100" y="404" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">PostgreSQL</text>
  <text x="100" y="422" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#185FA5">Computation engine</text>
  <path id="p-pg" d="M180 412 Q240 412 260 270" fill="none" stroke="#378ADD" stroke-width="1" opacity=".5" marker-end="url(#arrow)" marker-start="url(#arrowR)"/>

  <!-- === RIGHT SIDE: Read-only projections === -->

  <rect x="500" y="56" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="78" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">Golang</text>
  <path id="p-go" d="M450 220 Q480 220 490 78" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="114" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="136" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">Django / Python</text>
  <path id="p-django" d="M450 225 Q475 225 500 136" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="172" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="194" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">Entity Framework</text>
  <path id="p-ef" d="M450 232 Q470 232 500 194" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="244" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="266" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">English docs</text>
  <path id="p-eng" d="M450 248 Q470 248 500 266" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="302" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="324" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">OWL</text>
  <path id="p-owl" d="M450 258 Q475 258 500 324" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="360" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="382" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">UML</text>
  <path id="p-uml" d="M450 262 Q480 262 500 382" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <rect x="500" y="418" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="575" y="440" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">CSV / Binary / YAML</text>
  <path id="p-csv" d="M450 268 Q485 268 500 440" fill="none" stroke="#888780" stroke-width="0.8" opacity=".4" marker-end="url(#arrow)"/>

  <!-- answer-key.json badge -->
  <line x1="340" y1="270" x2="340" y2="480" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 4" opacity=".4"/>
  <rect x="240" y="480" width="200" height="32" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="340" y="496" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#712B13">answer-key.json validates all</text>

  <!-- === Animated particles: bidirectional === -->

  <!-- Airtable outbound -->
  <circle r="3" fill="#BA7517">
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite"/>
    <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#p-airtable"/></animateMotion>
  </circle>
  <!-- Airtable inbound -->
  <circle r="3" fill="#BA7517">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
    <animateMotion dur="2.8s" repeatCount="indefinite" begin="0.6s" keyPoints="1;0" keyTimes="0;1"><mpath href="#p-airtable"/></animateMotion>
  </circle>

  <!-- XLSX outbound -->
  <circle r="3" fill="#639922">
    <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite" begin="0.3s"/>
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.3s"><mpath href="#p-xlsx"/></animateMotion>
  </circle>
  <!-- XLSX inbound -->
  <circle r="3" fill="#639922">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    <animateMotion dur="3s" repeatCount="indefinite" begin="0.8s" keyPoints="1;0" keyTimes="0;1"><mpath href="#p-xlsx"/></animateMotion>
  </circle>

  <!-- Baserow outbound -->
  <circle r="3" fill="#1D9E75">
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s"><mpath href="#p-baserow"/></animateMotion>
  </circle>
  <!-- Baserow inbound -->
  <circle r="3" fill="#1D9E75">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="2.9s" repeatCount="indefinite" begin="1s"/>
    <animateMotion dur="2.9s" repeatCount="indefinite" begin="1s" keyPoints="1;0" keyTimes="0;1"><mpath href="#p-baserow"/></animateMotion>
  </circle>

  <!-- PostgreSQL outbound -->
  <circle r="3" fill="#378ADD">
    <animate attributeName="opacity" values="0;1;1;0" dur="2.7s" repeatCount="indefinite" begin="0.2s"/>
    <animateMotion dur="2.7s" repeatCount="indefinite" begin="0.2s"><mpath href="#p-pg"/></animateMotion>
  </circle>
  <!-- PostgreSQL inbound -->
  <circle r="3" fill="#378ADD">
    <animate attributeName="opacity" values="0;.7;.7;0" dur="3.1s" repeatCount="indefinite" begin="0.7s"/>
    <animateMotion dur="3.1s" repeatCount="indefinite" begin="0.7s" keyPoints="1;0" keyTimes="0;1"><mpath href="#p-pg"/></animateMotion>
  </circle>

  <!-- === Animated particles: read-only === -->
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.2s" repeatCount="indefinite" begin="0.1s"/>
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.1s"><mpath href="#p-go"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.3s" repeatCount="indefinite" begin="0.4s"/>
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="0.4s"><mpath href="#p-django"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.1s" repeatCount="indefinite" begin="0.7s"/>
    <animateMotion dur="2.1s" repeatCount="indefinite" begin="0.7s"><mpath href="#p-ef"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.4s" repeatCount="indefinite" begin="0.2s"/>
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.2s"><mpath href="#p-eng"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s"><mpath href="#p-owl"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#p-uml"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#888780">
    <animate attributeName="opacity" values="0;.6;.6;0" dur="2.7s" repeatCount="indefinite" begin="0.3s"/>
    <animateMotion dur="2.7s" repeatCount="indefinite" begin="0.3s"><mpath href="#p-csv"/></animateMotion>
  </circle>
</svg>
