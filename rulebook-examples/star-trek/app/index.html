<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Trek Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 2px solid #00d4ff;
      margin-bottom: 30px;
    }
    h1 { font-size: 2.5em; color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
    .subtitle { color: #888; margin-top: 10px; }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1em;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #00d4ff;
      border-bottom-color: #00d4ff;
    }
    .tab-btn:hover { color: #00d4ff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #00d4ff;
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .panel h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.3em; }
    .item-list { list-style: none; max-height: 500px; overflow-y: auto; }
    .item {
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(0, 212, 255, 0.1);
      border-left: 3px solid #00d4ff;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .item:hover {
      background: rgba(0, 212, 255, 0.2);
      transform: translateX(5px);
    }
    .item-name { font-weight: bold; color: #00d4ff; }
    .item-subtitle { font-size: 0.9em; color: #aaa; margin-top: 4px; }
    .item-stats { font-size: 0.85em; color: #666; margin-top: 4px; }
    .details { margin-top: 20px; }
    .detail-field { margin-bottom: 12px; }
    .label { color: #00d4ff; font-weight: bold; }
    .value { color: #ccc; margin-top: 4px; }
    .sub-list { list-style: none; margin-top: 15px; }
    .sub-item {
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      margin-bottom: 6px;
      border-radius: 4px;
      cursor: pointer;
      border-left: 2px solid #666;
      transition: all 0.2s;
    }
    .sub-item:hover {
      background: rgba(0, 212, 255, 0.1);
      border-left-color: #00d4ff;
    }
    .sub-name { color: #00d4ff; font-weight: bold; }
    .sub-desc { font-size: 0.85em; color: #888; margin-top: 2px; }
    .loading { text-align: center; color: #888; padding: 20px; }
    .error { color: #ff6b6b; padding: 10px; background: rgba(255, 107, 107, 0.1); border-radius: 4px; }
    @media (max-width: 768px) {
      .content { grid-template-columns: 1fr; }
      h1 { font-size: 1.8em; }
      .tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Star Trek Explorer</h1>
      <p class="subtitle">Browse TV series, movies, seasons, and episodes</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('series')">Series</button>
      <button class="tab-btn" onclick="switchTab('movies')">Movies</button>
    </div>

    <div id="series" class="tab-content active">
      <div class="content">
        <div class="panel">
          <h2>Series</h2>
          <div id="seriesList" class="loading">Loading series...</div>
        </div>
        <div class="panel">
          <h2>Details</h2>
          <div id="seriesDetails" style="color: #888; text-align: center; padding: 40px 0;">Select a series to view details</div>
        </div>
      </div>
    </div>

    <div id="movies" class="tab-content">
      <div class="content">
        <div class="panel">
          <h2>Movies</h2>
          <div id="moviesList" class="loading">Loading movies...</div>
        </div>
        <div class="panel">
          <h2>Movie Details</h2>
          <div id="movieDetails" style="color: #888; text-align: center; padding: 40px 0;">Select a movie to view details</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'movies' && document.getElementById('moviesList').textContent === 'Loading movies...') {
        loadMovies();
      } else if (tabName === 'series' && document.getElementById('seriesList').textContent === 'Loading series...') {
        loadSeries();
      }
    }

    async function loadSeries() {
      try {
        const response = await fetch(`${API_BASE}/series`);
        const series = await response.json();

        const list = document.getElementById('seriesList');
        list.innerHTML = '';

        series.forEach(s => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `
            <div class="item-name">${s.show_code}</div>
            <div class="item-subtitle">${s.title}</div>
            <div class="item-stats">${s.series_number ? 'Series ' + s.series_number : ''}</div>
          `;
          item.onclick = () => showSeriesDetails(s);
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Error loading series:', err);
        document.getElementById('seriesList').innerHTML = '<div class="error">Failed to load series</div>';
      }
    }

    async function showSeriesDetails(series) {
      const details = document.getElementById('seriesDetails');
      details.innerHTML = `
        <div class="details">
          <div class="detail-field">
            <div class="label">Code</div>
            <div class="value">${series.show_code}</div>
          </div>
          <div class="detail-field">
            <div class="label">Title</div>
            <div class="value">${series.title}</div>
          </div>
          <div class="detail-field">
            <div class="label">Network</div>
            <div class="value">${series.network || 'Unknown'}</div>
          </div>
          <div class="detail-field">
            <div class="label">Premiere Date</div>
            <div class="value">${series.premiere_date ? new Date(series.premiere_date).toLocaleDateString() : 'Unknown'}</div>
          </div>
          <div class="detail-field">
            <div class="label">Description</div>
            <div class="value">${series.description || 'No description'}</div>
          </div>
        </div>
        <div id="seasonsList" class="loading" style="margin-top: 20px;">Loading seasons...</div>
      `;
      loadSeasons(series.serie_id);
    }

    async function loadSeasons(seriesId) {
      try {
        const response = await fetch(`${API_BASE}/series/${seriesId}/seasons`);
        const seasons = await response.json();

        const list = document.getElementById('seasonsList');
        list.innerHTML = '';

        if (seasons.length === 0) {
          list.innerHTML = '<div style="color: #666;">No seasons found</div>';
          return;
        }

        seasons.forEach(s => {
          const item = document.createElement('div');
          item.className = 'sub-item';
          item.innerHTML = `
            <div class="sub-name">Season ${s.season_number}</div>
            <div class="sub-desc">${s.title || ''} • ${s.episode_count} episodes</div>
          `;
          item.onclick = () => loadEpisodes(s.season_id);
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Error loading seasons:', err);
        document.getElementById('seasonsList').innerHTML = '<div class="error">Failed to load seasons</div>';
      }
    }

    async function loadEpisodes(seasonId) {
      try {
        const response = await fetch(`${API_BASE}/seasons/${seasonId}/episodes`);
        const episodes = await response.json();

        const list = document.getElementById('seasonsList');
        list.innerHTML = '<div class="label" style="margin-bottom: 10px;">Episodes:</div>';

        episodes.forEach(ep => {
          const item = document.createElement('div');
          item.className = 'sub-item';
          item.innerHTML = `
            <div class="sub-name">Ep ${ep.episode_number}: ${ep.title || 'Untitled'}</div>
            <div class="sub-desc">${ep.airdate ? new Date(ep.airdate).toLocaleDateString() : 'N/A'}</div>
          `;
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Error loading episodes:', err);
      }
    }

    async function loadMovies() {
      try {
        const response = await fetch(`${API_BASE}/movies`);
        const movies = await response.json();

        const list = document.getElementById('moviesList');
        list.innerHTML = '';

        movies.forEach(m => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `
            <div class="item-name">${m.title}</div>
            <div class="item-subtitle">Released ${new Date(m.release_date).getFullYear()}</div>
            <div class="item-stats">${m.runtime_minutes} min • Box Office: $${(m.box_office / 1000000).toFixed(1)}M</div>
          `;
          item.onclick = () => showMovieDetails(m);
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Error loading movies:', err);
        document.getElementById('moviesList').innerHTML = '<div class="error">Failed to load movies</div>';
      }
    }

    async function showMovieDetails(movie) {
      const details = document.getElementById('movieDetails');
      details.innerHTML = `
        <div class="details">
          <div class="detail-field">
            <div class="label">Title</div>
            <div class="value">${movie.title}</div>
          </div>
          <div class="detail-field">
            <div class="label">Release Date</div>
            <div class="value">${new Date(movie.release_date).toLocaleDateString()}</div>
          </div>
          <div class="detail-field">
            <div class="label">Runtime</div>
            <div class="value">${movie.runtime_minutes} minutes</div>
          </div>
          <div class="detail-field">
            <div class="label">Budget</div>
            <div class="value">$${(movie.budget / 1000000).toFixed(1)}M</div>
          </div>
          <div class="detail-field">
            <div class="label">Box Office</div>
            <div class="value">$${(movie.box_office / 1000000).toFixed(1)}M</div>
          </div>
          <div class="detail-field">
            <div class="label">Director</div>
            <div class="value">${movie.director_name || 'Unknown'}</div>
          </div>
          <div class="detail-field">
            <div class="label">Description</div>
            <div class="value">${movie.description || 'No description'}</div>
          </div>
        </div>
      `;
    }

    // Load series on page load
    loadSeries();
  </script>
</body>
</html>
