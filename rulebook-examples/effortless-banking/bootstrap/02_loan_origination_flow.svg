<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <rect width="1440" height="720" fill="#FAFAF7"/>

  <text x="60" y="60" font-size="28" font-weight="600" fill="#2C2C2A">Loan Origination Journey</text>
  <text x="60" y="88" font-size="14" fill="#5F5E5A">From inquiry to funded · who does what, when</text>

  <text x="80" y="140" font-size="12" font-weight="600" fill="#534AB7" letter-spacing="1">CUSTOMER</text>
  <text x="80" y="270" font-size="12" font-weight="600" fill="#0F6E56" letter-spacing="1">RELATIONSHIP MGR</text>
  <text x="80" y="400" font-size="12" font-weight="600" fill="#993C1D" letter-spacing="1">UNDERWRITER</text>
  <text x="80" y="530" font-size="12" font-weight="600" fill="#5F5E5A" letter-spacing="1">SYSTEM</text>

  <line x1="220" y1="160" x2="1400" y2="160" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="220" y1="290" x2="1400" y2="290" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="220" y1="420" x2="1400" y2="420" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="220" y1="550" x2="1400" y2="550" stroke="#D3D1C7" stroke-width="0.5"/>

  <rect x="240" y="130" width="180" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="260" y="156" font-size="13" font-weight="600" fill="#3C3489">1. Inquiry</text>
  <text x="260" y="174" font-size="11" fill="#534AB7">Portal form or call to RM</text>

  <rect x="440" y="260" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="460" y="286" font-size="13" font-weight="600" fill="#085041">2. Pre-qualification</text>
  <text x="460" y="304" font-size="11" fill="#0F6E56">Initial discussion, fit check</text>

  <rect x="640" y="130" width="180" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="660" y="156" font-size="13" font-weight="600" fill="#3C3489">3. Application</text>
  <text x="660" y="174" font-size="11" fill="#534AB7">Upload docs via portal</text>

  <rect x="640" y="520" width="180" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="660" y="546" font-size="13" font-weight="600" fill="#2C2C2A">4. KYB &amp; bureau pull</text>
  <text x="660" y="564" font-size="11" fill="#5F5E5A">Automated · 2-5 min</text>

  <rect x="840" y="260" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="860" y="286" font-size="13" font-weight="600" fill="#085041">5. Package &amp; submit</text>
  <text x="860" y="304" font-size="11" fill="#0F6E56">RM reviews and forwards</text>

  <rect x="840" y="390" width="180" height="60" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="860" y="416" font-size="13" font-weight="600" fill="#712B13">6. Credit analysis</text>
  <text x="860" y="434" font-size="11" fill="#993C1D">Spreads, DSCR, decision</text>

  <rect x="1040" y="390" width="180" height="60" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="1060" y="416" font-size="13" font-weight="600" fill="#712B13">7. Committee approval</text>
  <text x="1060" y="434" font-size="11" fill="#993C1D">Loan committee or auth</text>

  <rect x="1040" y="260" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="1060" y="286" font-size="13" font-weight="600" fill="#085041">8. Closing prep</text>
  <text x="1060" y="304" font-size="11" fill="#0F6E56">Term sheet, docs, e-sign</text>

  <rect x="1240" y="130" width="160" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="1260" y="156" font-size="13" font-weight="600" fill="#3C3489">9. Sign &amp; fund</text>
  <text x="1260" y="174" font-size="11" fill="#534AB7">Customer signs, funds wire</text>

  <line x1="420" y1="160" x2="440" y2="280" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="620" y1="290" x2="640" y2="170" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="730" y1="190" x2="730" y2="518" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="820" y1="550" x2="840" y2="290" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="930" y1="320" x2="930" y2="388" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="1020" y1="420" x2="1040" y2="420" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="1130" y1="390" x2="1130" y2="322" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="1220" y1="280" x2="1240" y2="180" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="60" y="630" width="1320" height="60" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
  <text x="80" y="654" font-size="12" font-weight="600" fill="#5F5E5A" letter-spacing="1">SLA TARGETS</text>
  <text x="80" y="676" font-size="12" fill="#2C2C2A">Pre-qual: same day  ·  Application to underwriting: 3 business days  ·  Decision: 5-10 days  ·  Closing: 3-5 days after approval  ·  Total target: 14-21 days</text>
</svg>
