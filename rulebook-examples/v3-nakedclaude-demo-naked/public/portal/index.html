<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Customer Portal · naked-claude-demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --fg: #111827; --muted: #6b7280; --bg: #f3f4f6; --card: #fff;
    --line: #e5e7eb; --accent: #4f46e5; --accent-2: #6366f1;
    --ok: #059669; --warn: #d97706; --bad: #dc2626; --gold: #b45309;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header.top {
    background: linear-gradient(90deg, #312e81 0%, #4f46e5 100%);
    color: #fff; padding: 12px 20px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }
  header.top .brand { font-weight: 700; font-size: 17px; letter-spacing: .3px; }
  header.top nav { display: flex; gap: 4px; flex-wrap: wrap; }
  header.top nav a {
    color: #e0e7ff; padding: 6px 12px; border-radius: 6px;
  }
  header.top nav a:hover { background: rgba(255,255,255,.12); text-decoration: none; }
  header.top nav a.active { background: rgba(255,255,255,.2); color: #fff; }
  header.top .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  header.top .who, header.top .cart-btn {
    background: rgba(255,255,255,.15); color: #fff; border: 0; padding: 6px 12px;
    border-radius: 999px; cursor: pointer; font: inherit;
  }
  header.top .who:hover, header.top .cart-btn:hover { background: rgba(255,255,255,.25); }
  main { max-width: 1100px; margin: 0 auto; padding: 22px; }
  h1 { margin: 0 0 16px; font-size: 22px; }
  h2 { margin: 24px 0 10px; font-size: 17px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  .grid { display: grid; gap: 14px; }
  .grid.kpi { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
  .kpi .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .kpi .card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .grid.products { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .product { display: flex; flex-direction: column; gap: 8px; }
  .product .price { font-size: 18px; font-weight: 700; color: var(--accent); }
  .product .sku { font-size: 12px; color: var(--muted); }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.ok { background: #d1fae5; color: #065f46; }
  .pill.warn { background: #fef3c7; color: #92400e; }
  .pill.bad { background: #fee2e2; color: #991b1b; }
  .pill.muted { background: #e5e7eb; color: #374151; }
  .pill.vip { background: #fef3c7; color: var(--gold); border: 1px solid #fbbf24; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 9px 12px; border-bottom: 1px solid var(--line); text-align: left; }
  th { background: #f9fafb; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; color: var(--muted); }
  tbody tr:hover { background: #f9fafb; }
  .right-align { text-align: right; }
  button.primary { background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; font: inherit; }
  button.primary:hover { background: #4338ca; }
  button.primary:disabled { background: #9ca3af; cursor: not-allowed; }
  button.ghost { background: #fff; border: 1px solid var(--line); padding: 7px 12px; border-radius: 6px; cursor: pointer; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip { padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px; background: #fff; cursor: pointer; font-size: 13px; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  input[type=text], input[type=search], input[type=number], select {
    padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px; font: inherit;
  }
  .stepper { display: inline-flex; align-items: center; gap: 4px; }
  .stepper button { width: 26px; height: 26px; border: 1px solid var(--line); background: #fff; border-radius: 4px; cursor: pointer; }
  .stepper input { width: 50px; text-align: center; }
  .banner { padding: 10px 14px; border-radius: 8px; margin: 0 0 14px; }
  .banner.bad { background: #fee2e2; color: #991b1b; }
  .banner.warn { background: #fef3c7; color: #92400e; }
  .banner.ok { background: #d1fae5; color: #065f46; }
  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,.55); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 10px; width: min(560px, 95vw); max-height: 90vh; overflow: auto; }
  .modal h3 { margin: 0; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .modal .body { padding: 14px 18px; }
  .modal .actions { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .tabs a { padding: 8px 14px; border-bottom: 2px solid transparent; color: var(--muted); }
  .tabs a.active { color: var(--fg); border-bottom-color: var(--accent); font-weight: 600; }
  .empty { padding: 28px; text-align: center; color: var(--muted); }
  .muted { color: var(--muted); }
</style>
</head>
<body>
<header class="top">
  <div class="brand">🛒 Wholesale Portal</div>
  <nav id="nav">
    <a href="#/" data-r="">Home</a>
    <a href="#/shop" data-r="shop">Shop</a>
    <a href="#/orders" data-r="orders">Orders</a>
    <a href="#/account" data-r="account">Account</a>
  </nav>
  <div class="right">
    <button class="cart-btn" id="cartBtn">🛒 <span id="cartCount">0</span></button>
    <button class="who" id="whoBtn">…</button>
  </div>
</header>
<main id="view"></main>
<div id="modalRoot"></div>

<script>
// -------- shared state ----------------------------------------------------
const TAX_RATE_PREVIEW = 0.0875;   // checkout-side preview only — server uses real rate
const $ = s => document.querySelector(s);
const fmt$ = n => '$' + Number(n || 0).toFixed(2);
const fmtPct = n => (Number(n||0) * 100).toFixed(2) + '%';

const Store = {
  get clientId() { return localStorage.getItem('portal:clientId'); },
  set clientId(v) { v ? localStorage.setItem('portal:clientId', v) : localStorage.removeItem('portal:clientId'); },
  cartKey() { return 'portal:cart:' + (this.clientId || 'anon'); },
  getCart() {
    try { return JSON.parse(localStorage.getItem(this.cartKey())) || []; }
    catch { return []; }
  },
  setCart(cart) { localStorage.setItem(this.cartKey(), JSON.stringify(cart)); updateCartBadge(); },
  addToCart(productId, qty = 1) {
    const cart = this.getCart();
    const ex = cart.find(c => c.productId === productId);
    if (ex) ex.qty = Number(ex.qty) + qty;
    else cart.push({ productId, qty });
    this.setCart(cart);
  },
  clearCart() { this.setCart([]); }
};

async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}
async function jsend(method, url, body) {
  const r = await fetch(url, { method, headers: { 'content-type': 'application/json' }, body: body ? JSON.stringify(body) : undefined });
  if (!r.ok && r.status !== 204) {
    const t = await r.text();
    throw new Error(`${url}: ${r.status} ${t}`);
  }
  return r.status === 204 ? null : r.json();
}

function updateCartBadge() {
  const cart = Store.getCart();
  const c = cart.reduce((s,i) => s + Number(i.qty||0), 0);
  $('#cartCount').textContent = c;
}

// -------- modal helpers ---------------------------------------------------
function openModal(html, onClose) {
  $('#modalRoot').innerHTML = `<div class="modal-backdrop" id="back"><div class="modal">${html}</div></div>`;
  const close = () => { $('#modalRoot').innerHTML = ''; onClose && onClose(); };
  $('#back').addEventListener('click', e => { if (e.target.id === 'back') close(); });
  return close;
}

// -------- customer switcher ----------------------------------------------
async function pickCustomer() {
  const clients = await jget('/api/clients');
  const html = `
    <h3>Sign in as a customer</h3>
    <div class="body">
      <input id="cust-search" type="search" placeholder="Search…" style="width:100%;margin-bottom:10px" />
      <div id="cust-list" style="max-height:320px;overflow:auto"></div>
    </div>
    <div class="actions"><button class="ghost" id="cancel">Cancel</button></div>`;
  const close = openModal(html);
  const list = $('#cust-list');
  function renderList(filter='') {
    const f = filter.toLowerCase();
    list.innerHTML = clients
      .filter(c => !f || (c.name||'').toLowerCase().includes(f) || (c.email||'').toLowerCase().includes(f))
      .map(c => `
        <div class="card" style="margin-bottom:6px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer" data-id="${c.airtable_id}">
          <div style="flex:1">
            <div style="font-weight:600">${escapeHtml(c.name||'(unnamed)')}</div>
            <div class="muted" style="font-size:12px">${escapeHtml(c.email||'')}</div>
          </div>
          ${c.is_vip ? '<span class="pill vip">VIP</span>' : ''}
          ${c.is_stopped ? '<span class="pill bad">stopped</span>' : ''}
        </div>`).join('') || '<div class="empty">No clients.</div>';
    list.querySelectorAll('[data-id]').forEach(el => {
      el.onclick = () => { Store.clientId = el.dataset.id; close(); refresh(); };
    });
  }
  renderList();
  $('#cust-search').oninput = e => renderList(e.target.value);
  $('#cancel').onclick = close;
}

// -------- cart modal ------------------------------------------------------
async function openCartModal() {
  location.hash = '#/cart';
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// -------- top bar / who chip ---------------------------------------------
async function refreshWho() {
  const id = Store.clientId;
  if (!id) { $('#whoBtn').textContent = 'Sign in'; return null; }
  try {
    const c = await jget(`/api/clients/${id}`);
    $('#whoBtn').innerHTML = `${escapeHtml(c.name||'(client)')}${c.is_vip ? ' <span class="pill vip" style="margin-left:4px">VIP</span>' : ''}${c.is_stopped ? ' <span class="pill bad" style="margin-left:4px">stopped</span>' : ''}`;
    return c;
  } catch { $('#whoBtn').textContent = 'Sign in'; return null; }
}

$('#whoBtn').addEventListener('click', pickCustomer);
$('#cartBtn').addEventListener('click', () => { location.hash = '#/cart'; });

// -------- routing ---------------------------------------------------------
const routes = [];
function route(pattern, handler) { routes.push({ pattern, handler }); }
function parseHash() {
  let h = location.hash.replace(/^#/, '');
  if (!h || h === '/') h = '/';
  const [path, q = ''] = h.split('?');
  const query = Object.fromEntries(new URLSearchParams(q));
  return { path, query };
}
async function dispatch() {
  const { path, query } = parseHash();
  for (const r of routes) {
    const m = path.match(r.pattern);
    if (m) {
      highlightNav(path);
      try { await r.handler(m.slice(1), query); }
      catch (e) { $('#view').innerHTML = `<div class="banner bad">${escapeHtml(e.message)}</div>`; }
      return;
    }
  }
  $('#view').innerHTML = '<div class="empty">Page not found.</div>';
}
function highlightNav(path) {
  let active = '';
  if (path === '/' || path === '') active = '';
  else if (path.startsWith('/shop')) active = 'shop';
  else if (path.startsWith('/orders')) active = 'orders';
  else if (path.startsWith('/account')) active = 'account';
  document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.r === active));
}
window.addEventListener('hashchange', dispatch);

async function refresh() { updateCartBadge(); await refreshWho(); dispatch(); }

// ----------------- routes ------------------------------------------------

// Home: KPIs + recent orders
route(/^\/?$/, async () => {
  const me = await refreshWho();
  if (!me) {
    $('#view').innerHTML = `
      <div class="card">
        <h1>Welcome</h1>
        <p>Pick a customer to begin browsing the catalog and managing your orders.</p>
        <button class="primary" onclick="pickCustomer()">Sign in</button>
      </div>`;
    return;
  }
  const invoices = await jget(`/api/clients/${me.airtable_id}/invoices`);
  const open = invoices.reduce((s,i) => s + Number(i.amount_due || 0), 0);
  const lifetime = invoices.reduce((s,i) => s + Number(i.invoice_total || 0), 0);
  const last = invoices[0]?.invoice_date || '—';
  const recent = invoices.slice(0, 5);
  $('#view').innerHTML = `
    <h1>Welcome back, ${escapeHtml(me.name||'')} ${me.is_vip ? '<span class="pill vip">VIP</span>' : ''}</h1>
    ${me.is_stopped ? '<div class="banner bad">Your account is currently on hold. Please contact support before placing new orders.</div>' : ''}
    <div class="grid kpi">
      <div class="card"><div class="label">Open balance</div><div class="value">${fmt$(open)}</div></div>
      <div class="card"><div class="label">Lifetime spend</div><div class="value">${fmt$(lifetime)}</div></div>
      <div class="card"><div class="label">Total orders</div><div class="value">${invoices.length}</div></div>
      <div class="card"><div class="label">Last order</div><div class="value" style="font-size:18px">${last}</div></div>
    </div>
    <h2>Recent orders</h2>
    <div class="card" style="padding:0">
      ${recent.length ? `<table><thead><tr><th>Date</th><th>Invoice</th><th class="right-align">Total</th><th class="right-align">Due</th><th>Status</th></tr></thead><tbody>${
        recent.map(i => `<tr style="cursor:pointer" onclick="location.hash='#/orders/${i.airtable_id}'">
          <td>${i.invoice_date || ''}</td>
          <td>${escapeHtml(i.name||i.airtable_id)}</td>
          <td class="right-align">${fmt$(i.invoice_total)}</td>
          <td class="right-align">${fmt$(i.amount_due)}</td>
          <td>${paymentPill(i.payment_status_label)}</td>
        </tr>`).join('')
      }</tbody></table>` : '<div class="empty">No orders yet.</div>'}
    </div>`;
});

function paymentPill(s) {
  const cls = s === 'Paid' ? 'ok' : s === 'Partial' ? 'warn' : 'bad';
  return `<span class="pill ${cls}">${s||'Unpaid'}</span>`;
}

// Shop list
route(/^\/shop\/?$/, async (_m, q) => {
  const products = await jget('/api/products');
  const search = (q.q || '').toLowerCase();
  const status = q.status || 'active';
  let list = products.filter(p => status === 'all' ? true : (status === 'active' ? p.is_active : !p.is_active));
  if (search) list = list.filter(p => (p.name||'').toLowerCase().includes(search) || (p.sku||'').toLowerCase().includes(search));
  $('#view').innerHTML = `
    <h1>Shop</h1>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <input id="q" type="search" placeholder="Search products…" value="${escapeHtml(q.q||'')}" style="flex:1;min-width:200px" />
      <div class="chips">
        ${['active','all','inactive'].map(s => `<a class="chip ${status===s?'active':''}" href="#/shop?status=${s}${q.q?'&q='+encodeURIComponent(q.q):''}">${s}</a>`).join('')}
      </div>
    </div>
    <div class="grid products">
      ${list.map(p => `
        <div class="card product">
          <div style="display:flex;align-items:start;gap:6px">
            <div style="flex:1"><a href="#/shop/${p.airtable_id}" style="font-weight:600;color:var(--fg)">${escapeHtml(p.name||'')}</a>
              <div class="sku">${escapeHtml(p.sku||'')}</div></div>
            ${p.is_high_margin ? '<span class="pill ok">high margin</span>' : ''}
          </div>
          <div class="price">${fmt$(p.unit_price)}</div>
          <div class="muted" style="font-size:12px">Stock: ${Number(p.stock_quantity||0)}</div>
          <button class="primary" data-add="${p.airtable_id}" ${p.is_active?'':'disabled'}>Add to cart</button>
        </div>`).join('') || '<div class="empty">No products match.</div>'}
    </div>`;
  $('#q').oninput = e => {
    const v = e.target.value;
    clearTimeout(window.__qDebounce);
    window.__qDebounce = setTimeout(() => {
      location.hash = `#/shop?status=${status}${v?'&q='+encodeURIComponent(v):''}`;
    }, 200);
  };
  document.querySelectorAll('[data-add]').forEach(b => {
    b.onclick = () => { Store.addToCart(b.dataset.add, 1); flashCart(); };
  });
});

function flashCart() {
  $('#cartBtn').animate(
    [{ transform: 'scale(1)' }, { transform: 'scale(1.18)' }, { transform: 'scale(1)' }],
    { duration: 280 }
  );
  updateCartBadge();
}

// Product detail
route(/^\/shop\/([^/]+)$/, async ([id]) => {
  const p = await jget(`/api/products/${id}`);
  $('#view').innerHTML = `
    <p><a href="#/shop">← Back to shop</a></p>
    <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div>
        <h1>${escapeHtml(p.name||'')}</h1>
        <div class="muted">${escapeHtml(p.sku||'')}</div>
        <p>${escapeHtml(p.description||'')}</p>
        ${p.is_high_margin ? '<span class="pill ok">high margin</span>' : ''}
        ${!p.is_active ? '<span class="pill muted">inactive</span>' : ''}
      </div>
      <div>
        <div class="price" style="font-size:32px;color:var(--accent);font-weight:700">${fmt$(p.unit_price)}</div>
        <div class="muted">In stock: ${Number(p.stock_quantity||0)}</div>
        <div style="margin-top:18px">
          <label>Quantity</label>
          <div class="stepper" style="margin-top:6px">
            <button id="dec">−</button>
            <input id="qty" type="number" value="1" min="1" />
            <button id="inc">+</button>
          </div>
        </div>
        <button class="primary" id="add" style="margin-top:18px" ${p.is_active?'':'disabled'}>Add to cart</button>
      </div>
    </div>`;
  $('#dec').onclick = () => { const q = $('#qty'); q.value = Math.max(1, Number(q.value||1) - 1); };
  $('#inc').onclick = () => { const q = $('#qty'); q.value = Number(q.value||1) + 1; };
  $('#add').onclick = () => { Store.addToCart(p.airtable_id, Number($('#qty').value)||1); flashCart(); };
});

// Cart
route(/^\/cart\/?$/, async () => {
  const cart = Store.getCart();
  if (!cart.length) {
    $('#view').innerHTML = `<h1>Your cart</h1><div class="card empty">Cart is empty. <a href="#/shop">Browse the shop →</a></div>`;
    return;
  }
  const products = await jget('/api/products');
  const byId = Object.fromEntries(products.map(p => [p.airtable_id, p]));
  const me = await refreshWho();
  const lines = cart.map(c => {
    const p = byId[c.productId] || {};
    return { ...c, product: p, lineTotal: Number(p.unit_price||0) * Number(c.qty||0) };
  });
  const sub = lines.reduce((s,l) => s + l.lineTotal, 0);
  const tax = sub * TAX_RATE_PREVIEW;
  const total = sub + tax;
  $('#view').innerHTML = `
    <h1>Your cart</h1>
    ${me?.is_stopped ? '<div class="banner bad">Your account is on hold — checkout is disabled until it is cleared.</div>' : ''}
    <div class="card" style="padding:0">
      <table><thead><tr><th>Product</th><th>Qty</th><th class="right-align">Price</th><th class="right-align">Line total</th><th></th></tr></thead><tbody>
        ${lines.map((l, idx) => `
          <tr>
            <td>${escapeHtml(l.product.name || l.productId)}<div class="muted" style="font-size:12px">${escapeHtml(l.product.sku||'')}</div></td>
            <td>
              <div class="stepper">
                <button data-q="-" data-i="${idx}">−</button>
                <input data-i="${idx}" type="number" min="1" value="${l.qty}" />
                <button data-q="+" data-i="${idx}">+</button>
              </div>
            </td>
            <td class="right-align">${fmt$(l.product.unit_price)}</td>
            <td class="right-align">${fmt$(l.lineTotal)}</td>
            <td><button class="ghost" data-rem="${idx}">Remove</button></td>
          </tr>`).join('')}
      </tbody></table>
    </div>
    <div class="grid" style="grid-template-columns:1fr 320px;gap:18px;margin-top:14px">
      <div></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between"><span>Sub-total</span><strong>${fmt$(sub)}</strong></div>
        <div style="display:flex;justify-content:space-between"><span>Tax (preview ${(TAX_RATE_PREVIEW*100).toFixed(2)}%)</span><strong>${fmt$(tax)}</strong></div>
        <hr/>
        <div style="display:flex;justify-content:space-between;font-size:18px"><span>Total</span><strong>${fmt$(total)}</strong></div>
        <button class="primary" style="width:100%;margin-top:12px" id="checkout" ${(!me || me.is_stopped) ? 'disabled' : ''}>Checkout</button>
        ${!me ? '<p class="muted" style="margin-top:8px">Sign in to check out.</p>' : ''}
      </div>
    </div>`;
  document.querySelectorAll('[data-q]').forEach(b => {
    b.onclick = () => {
      const cart = Store.getCart();
      const i = Number(b.dataset.i);
      cart[i].qty = Math.max(1, Number(cart[i].qty||1) + (b.dataset.q === '+' ? 1 : -1));
      Store.setCart(cart); dispatch();
    };
  });
  document.querySelectorAll('input[data-i]').forEach(inp => {
    inp.onchange = () => {
      const cart = Store.getCart();
      cart[Number(inp.dataset.i)].qty = Math.max(1, Number(inp.value)||1);
      Store.setCart(cart); dispatch();
    };
  });
  document.querySelectorAll('[data-rem]').forEach(b => {
    b.onclick = () => {
      const cart = Store.getCart();
      cart.splice(Number(b.dataset.rem), 1);
      Store.setCart(cart); dispatch();
    };
  });
  $('#checkout').onclick = () => { location.hash = '#/checkout'; };
});

// Checkout
route(/^\/checkout\/?$/, async () => {
  const cart = Store.getCart();
  const me = await refreshWho();
  if (!me) { $('#view').innerHTML = '<div class="banner warn">Please sign in first.</div>'; return; }
  if (me.is_stopped) { $('#view').innerHTML = '<div class="banner bad">Account on hold — cannot check out.</div>'; return; }
  if (!cart.length) { location.hash = '#/cart'; return; }
  $('#view').innerHTML = `
    <h1>Confirm and place order</h1>
    <div class="card">
      <p>Placing <strong>${cart.length}</strong> line item${cart.length===1?'':'s'} for <strong>${escapeHtml(me.name)}</strong>.</p>
      <p class="muted">Shipping to: ${escapeHtml(me.address_formatted||'(no address on file)')}</p>
      <button class="primary" id="place">Place order</button>
      <button class="ghost" onclick="location.hash='#/cart'">Back to cart</button>
    </div>
    <pre id="log" class="muted" style="margin-top:14px;white-space:pre-wrap"></pre>`;
  $('#place').onclick = async () => {
    const log = $('#log');
    const append = m => { log.textContent += m + '\n'; };
    $('#place').disabled = true;
    try {
      const products = await jget('/api/products');
      const byId = Object.fromEntries(products.map(p => [p.airtable_id, p]));
      const today = new Date().toISOString().slice(0,10);
      append('Creating invoice…');
      const inv = await jsend('POST', '/api/invoices', {
        name: `Order ${today} ${me.name||''}`.trim(),
        client_id: me.airtable_id,
        invoice_date: today,
        tax_rate: TAX_RATE_PREVIEW
      });
      append(`Invoice ${inv.airtable_id} created.`);
      let sub = 0;
      for (const c of cart) {
        const p = byId[c.productId];
        if (!p) continue;
        const li = await jsend('POST', '/api/invoice_line_items', {
          name: `${p.name} × ${c.qty}`,
          invoice_id: inv.airtable_id,
          product_id: p.airtable_id,
          quantity: Number(c.qty),
          unit_price: Number(p.unit_price),
          discount_percent: Number(me.category_discount || 0)
        });
        sub += Number(li.sub_total || 0);
        append(` + ${p.name} × ${c.qty} = ${fmt$(li.sub_total)}`);
      }
      // optional: deposit payment
      append('Recording payment placeholder…');
      await jsend('POST', '/api/payments', {
        name: `Deposit for ${inv.airtable_id}`,
        invoice_id: inv.airtable_id,
        amount: 0,
        payment_status: 'Pending',
        payment_method: 'Web',
        payment_date: today
      });
      Store.clearCart();
      append('Done.');
      location.hash = `#/orders/${inv.airtable_id}`;
    } catch (e) {
      append('ERROR: ' + e.message);
      $('#place').disabled = false;
    }
  };
});

// Orders list
route(/^\/orders\/?$/, async (_m, q) => {
  const me = await refreshWho();
  if (!me) { $('#view').innerHTML = '<div class="banner warn">Please sign in.</div>'; return; }
  const invoices = await jget(`/api/clients/${me.airtable_id}/invoices`);
  const status = q.status || 'all';
  const list = invoices.filter(i => status === 'all'
    ? true
    : status === 'open' ? !i.is_paid_in_full
    : i.is_paid_in_full);
  $('#view').innerHTML = `
    <h1>Orders</h1>
    <div class="chips">
      ${['all','open','paid'].map(s => `<a class="chip ${status===s?'active':''}" href="#/orders?status=${s}">${s}</a>`).join('')}
    </div>
    <div class="card" style="padding:0">
      ${list.length ? `<table><thead><tr><th>Date</th><th>Invoice</th><th class="right-align">Sub-total</th><th class="right-align">Tax</th><th class="right-align">Total</th><th class="right-align">Due</th><th>Status</th></tr></thead><tbody>${
        list.map(i => `<tr style="cursor:pointer" onclick="location.hash='#/orders/${i.airtable_id}'">
          <td>${i.invoice_date||''}</td>
          <td>${escapeHtml(i.name||i.airtable_id)} ${i.is_big_order?'<span class="pill warn">big</span>':''}</td>
          <td class="right-align">${fmt$(i.sub_total)}</td>
          <td class="right-align">${fmt$(i.tax_amount)}</td>
          <td class="right-align">${fmt$(i.invoice_total)}</td>
          <td class="right-align">${fmt$(i.amount_due)}</td>
          <td>${paymentPill(i.payment_status_label)}</td>
        </tr>`).join('')
      }</tbody></table>` : '<div class="empty">No orders.</div>'}
    </div>`;
});

// Order detail
route(/^\/orders\/([^/]+)$/, async ([id], q) => {
  const tab = q.tab || 'items';
  const inv = await jget(`/api/invoices/${id}`);
  const items = await jget(`/api/invoices/${id}/line-items`);
  const pays = await jget(`/api/invoices/${id}/payments`);
  $('#view').innerHTML = `
    <p><a href="#/orders">← All orders</a></p>
    <h1>${escapeHtml(inv.name||inv.airtable_id)}</h1>
    <div class="grid kpi" style="margin-bottom:14px">
      <div class="card"><div class="label">Total</div><div class="value">${fmt$(inv.invoice_total)}</div></div>
      <div class="card"><div class="label">Due</div><div class="value">${fmt$(inv.amount_due)}</div></div>
      <div class="card"><div class="label">Status</div><div class="value">${paymentPill(inv.payment_status_label)}</div></div>
      <div class="card"><div class="label">Tax (${fmtPct(inv.effective_tax_rate||inv.tax_rate_effective)})</div><div class="value">${fmt$(inv.tax_amount)}</div></div>
    </div>
    <div class="tabs">
      <a class="${tab==='items'?'active':''}" href="#/orders/${id}?tab=items">Line items (${items.length})</a>
      <a class="${tab==='payments'?'active':''}" href="#/orders/${id}?tab=payments">Payments (${pays.length})</a>
    </div>
    <div class="card" style="padding:0">
      ${tab === 'items'
        ? (items.length
            ? `<table><thead><tr><th>Product</th><th class="right-align">Qty</th><th class="right-align">Unit</th><th class="right-align">Discount</th><th class="right-align">Sub-total</th></tr></thead><tbody>${
              items.map(li => `<tr>
                <td>${escapeHtml(li.product_name||li.product_id||'')}</td>
                <td class="right-align">${li.quantity}</td>
                <td class="right-align">${fmt$(li.unit_price)}</td>
                <td class="right-align">${fmtPct(li.discount_percent)}</td>
                <td class="right-align">${fmt$(li.sub_total)}</td>
              </tr>`).join('')
            }</tbody></table>`
            : '<div class="empty">No line items.</div>')
        : (pays.length
            ? `<table><thead><tr><th>Date</th><th>Method</th><th>Status</th><th class="right-align">Amount</th><th class="right-align">Counted</th></tr></thead><tbody>${
              pays.map(p => `<tr>
                <td>${p.payment_date||''}</td>
                <td>${escapeHtml(p.payment_method||'')}</td>
                <td>${p.is_completed ? '<span class="pill ok">Completed</span>' : '<span class="pill muted">'+escapeHtml(p.payment_status||'')+'</span>'}</td>
                <td class="right-align">${fmt$(p.amount)}</td>
                <td class="right-align">${fmt$(p.completed_amount)}</td>
              </tr>`).join('')
            }</tbody></table>`
            : '<div class="empty">No payments recorded.</div>')}
    </div>`;
});

// Account
route(/^\/account\/?$/, async () => {
  const me = await refreshWho();
  if (!me) { $('#view').innerHTML = '<div class="banner warn">Please sign in.</div>'; return; }
  $('#view').innerHTML = `
    <h1>Account ${me.is_vip ? '<span class="pill vip">VIP</span>' : ''}</h1>
    <div class="card">
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px">
        <div><div class="muted">Name</div><div><strong>${escapeHtml(me.name||'')}</strong></div></div>
        <div><div class="muted">Email</div><div>${escapeHtml(me.email||'')}</div></div>
        <div><div class="muted">Phone</div><div>${escapeHtml(me.phone||'')}</div></div>
        <div><div class="muted">Status</div><div>${me.is_stopped ? '<span class="pill bad">'+escapeHtml(me.status_name||'blocked')+'</span>' : '<span class="pill ok">'+escapeHtml(me.status_name||'active')+'</span>'}</div></div>
        <div><div class="muted">Category</div><div>${escapeHtml(me.client_category_name||'')} ${me.category_discount ? '· '+fmtPct(me.category_discount)+' off' : ''}</div></div>
        <div><div class="muted">Address</div><div>${escapeHtml(me.address_formatted||'(none)')}</div></div>
        <div><div class="muted">Lifetime spend</div><div>${fmt$(me.total_revenue)}</div></div>
        <div><div class="muted">Average order</div><div>${fmt$(me.average_order_value)}</div></div>
        <div><div class="muted">Open balance</div><div>${fmt$(me.open_balance)}</div></div>
        <div><div class="muted">Last invoice</div><div>${me.last_invoice_date||'—'}</div></div>
      </div>
      <div style="margin-top:14px">
        <button class="ghost" onclick="pickCustomer()">Switch customer</button>
        <button class="ghost" onclick="Store.clientId=null;refresh()">Sign out</button>
      </div>
    </div>`;
});

// boot
window.pickCustomer = pickCustomer;
window.Store = Store;
window.refresh = refresh;
refresh();
</script>
