<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Causal Autoimmune — Case Intake (admin)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Effortless Explainer DAG: click any derived cell (data-er-dag="Table.Field")
         to see exactly how it was computed. Generated by rulebook-to-explainer-dag
         into /public/rulebook-explainer-dag on every `effortless build`. -->
    <link rel="stylesheet" href="/rulebook-explainer-dag/dag.css" />
    <!-- Override: dag.css pins the ƒ toggle (.dag-toggle) position:fixed top-right.
         When it's mounted into our pinned bottom-left nav slot, make it flow
         in-place instead. (dag.css is generated — do not edit it; override here.) -->
    <style>
      /* Reset the browser's default 8px body margin. Without this, the whole app
         is inset 8px and the sticky nav (height: 100vh - header) overflows the
         viewport by 8px, pushing the ƒ provenance toggle below the fold. */
      html, body { margin: 0; padding: 0; }
      #explainer-toggle-mount .dag-toggle {
        position: static;
        top: auto; right: auto;
        box-shadow: none;
      }
      /* dag.css hides the ƒ badge (opacity:0) until you hover the exact cell, which
         reads as "there are no badges". When the provenance toggle is ON we want the
         ƒ glyphs ALWAYS visible (the toggle, not hover, is the on/off control). Force
         the badge visible at rest; the .dag-cell-quiet rule (toggle OFF) still wins
         and hides them. Also nudge the badge inward so it sits ON the value, not
         clipped 10px outside it. (Generated dag.css is not edited — overridden here.) */
      .dag-cell { position: relative; }
      .dag-cell .dag-cell-fx {
        opacity: 1 !important;
        transform: scale(1) !important;
        pointer-events: auto !important;
      }
      .dag-cell-badge-wrap { top: -8px !important; right: -6px !important; }
      .dag-cell-quiet .dag-cell-fx { opacity: 0 !important; }
    </style>
    <script src="/rulebook-explainer-dag/embedded-graph.js"></script>
    <script src="/rulebook-explainer-dag/dag-resolver.js"></script>
    <script src="/rulebook-explainer-dag/routing.js"></script>
    <script src="/rulebook-explainer-dag/explainer-dag.js"></script>
    <!-- The explainer is initialized by the React app (App.jsx) in CALLBACK mode,
         so DAG navigation routes through the app router and stays in-app. Do NOT
         init here (a modal-mode init would race the callback-mode one). The ƒ
         provenance toggle is mounted into #explainer-toggle-mount by App.jsx. -->
  </body>
</html>
