<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer FullName Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; }
    h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
    .subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #ddd; font-size: 13px; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    tr:hover { background: #fafafa; }

    .cell { cursor: pointer; position: relative; display: inline-block; }
    .cell:hover { background: #f0f0f0; border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }

    input { font: inherit; border: 1px solid #0066cc; padding: 4px 6px; border-radius: 3px; width: 100%; }
    input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1); }

    .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .read-mode { color: #333; }
    .email { color: #0066cc; }
    .fullname { font-weight: 500; color: #333; }

    .hint { font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Customers</h1>
    <p class="subtitle">Click any field to edit. Press Enter to save, Escape to cancel.</p>

    <table id="table">
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Full Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <p class="hint">✏️ Click to edit • ↩️ Enter to save • ⎋ Escape to cancel</p>
  </div>

  <script>
    async function load() {
      const res = await fetch('/api/customers');
      const customers = await res.json();
      const tbody = document.querySelector('#tbody');
      tbody.innerHTML = '';

      customers.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${editableCell(c.CustomerId, 'FirstName', c.FirstName)}</td>
          <td>${editableCell(c.CustomerId, 'LastName', c.LastName)}</td>
          <td><span class="fullname">${c.Name}</span></td>
          <td><span class="email">${c.EmailAddress}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function editableCell(customerId, field, value) {
      return `<span class="cell read-mode" data-id="${customerId}" data-field="${field}">${value}</span>`;
    }

    document.addEventListener('click', async (e) => {
      if (!e.target.classList.contains('cell')) return;

      const cell = e.target;
      const customerId = cell.dataset.id;
      const field = cell.dataset.field;
      const oldValue = cell.textContent;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldValue;
      cell.textContent = '';
      cell.appendChild(input);
      cell.classList.remove('read-mode');
      input.focus();
      input.select();

      const save = async () => {
        const newValue = input.value.trim();
        if (newValue && newValue !== oldValue) {
          const res = await fetch(`/api/customers/${customerId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [field]: newValue })
          });
          if (res.ok) await load();
        } else {
          cell.textContent = oldValue;
          cell.classList.add('read-mode');
        }
      };

      const cancel = () => {
        cell.textContent = oldValue;
        cell.classList.add('read-mode');
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') cancel();
      });

      input.addEventListener('blur', save);
    });

    load();
  </script>
</body>
</html>
